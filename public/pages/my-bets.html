<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Bets – BetaKE</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--g:#00c853;--g2:#00e65c;--bg:#080c08;--s1:#0d120d;--s2:#131a13;--s3:#192019;--bd:rgba(0,200,83,0.08);--tx:#e0f0e0;--mt:#4a6a4a;--yl:#ffd600;--rd:#ff3b3b;--bn:62px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:calc(var(--bn)+16px)}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(8,12,8,0.98);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;backdrop-filter:blur(20px)}
.tb-back{font-size:14px;color:var(--mt);background:none;border:none;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px}
.tb-back svg{width:16px;height:16px;fill:currentColor}
.tb-title{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700}
.tb-bal{font-size:13px;font-weight:800;color:var(--g)}

/* FILTER TABS */
.ftabs{display:flex;background:rgba(8,12,8,0.98);border-bottom:1px solid var(--bd);position:sticky;top:52px;z-index:49;backdrop-filter:blur(10px)}
.ftab{flex:1;padding:12px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.3px}
.ftab.on{color:var(--g);border-bottom-color:var(--g)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 12px 8px}
.stat{background:linear-gradient(135deg,rgba(19,26,19,0.95),rgba(13,18,13,0.98));border:1px solid var(--bd);border-radius:12px;padding:14px 10px;text-align:center}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;line-height:1}
.stat-lbl{font-size:10px;color:var(--mt);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}

/* BET CARDS */
.bets{padding:0 12px}
.bcard{background:linear-gradient(135deg,rgba(19,26,19,0.95),rgba(13,18,13,0.98));border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden}
.bcard-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid rgba(0,200,83,0.05)}
.bcard-left{}
.bcard-code{font-size:13px;font-weight:800;color:var(--tx);font-family:'Rajdhani',sans-serif;letter-spacing:0.5px}
.bcard-date{font-size:11px;color:var(--mt);margin-top:2px}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700}
.pill-pending{background:rgba(255,214,0,0.1);color:var(--yl);border:1px solid rgba(255,214,0,0.2)}
.pill-won{background:rgba(0,200,83,0.1);color:var(--g);border:1px solid rgba(0,200,83,0.2)}
.pill-lost{background:rgba(255,59,59,0.08);color:var(--rd);border:1px solid rgba(255,59,59,0.15)}
.pill-void{background:rgba(100,100,100,0.1);color:#666;border:1px solid rgba(100,100,100,0.15)}

.sels{padding:10px 14px}
.sel-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,200,83,0.04)}
.sel-row:last-child{border:none}
.sel-match{font-size:13px;font-weight:600}
.sel-pick{font-size:11px;color:var(--mt);margin-top:2px;display:flex;align-items:center;gap:5px}
.sel-result{font-size:10px;font-weight:800;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
.sr-won{background:rgba(0,200,83,0.15);color:var(--g)}
.sr-lost{background:rgba(255,59,59,0.1);color:var(--rd)}
.sr-pending{background:rgba(255,214,0,0.1);color:var(--yl)}
.sel-odd{font-size:15px;font-weight:800;color:var(--g)}

.bcard-foot{display:grid;grid-template-columns:repeat(4,1fr);background:rgba(0,200,83,0.03);border-top:1px solid rgba(0,200,83,0.05)}
.bf{padding:10px 8px;text-align:center;border-right:1px solid rgba(0,200,83,0.05)}
.bf:last-child{border:none}
.bf-lbl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:0.3px;font-weight:700}
.bf-val{font-size:13px;font-weight:800;margin-top:3px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px}
.empty-ic{font-size:56px;margin-bottom:16px}
.empty-ttl{font-size:18px;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--mt);line-height:1.6}
.empty-btn{display:inline-block;margin-top:20px;padding:13px 28px;background:linear-gradient(135deg,#00e65c,#00c853);color:#000;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;border:none;box-shadow:0 4px 16px rgba(0,200,83,0.3)}

/* LOADING */
.spin{width:30px;height:30px;border:3px solid rgba(0,200,83,0.1);border-top-color:var(--g);border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:50px;color:var(--mt);font-size:14px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:199;background:rgba(8,12,8,0.98);border-top:1px solid rgba(0,200,83,0.1);display:flex;height:var(--bn);backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--mt);cursor:pointer;gap:2px;transition:all 0.2s;position:relative;padding:6px 0;text-transform:uppercase;letter-spacing:0.3px}
.bni.on{color:var(--g)}
.bni.on::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--g);border-radius:0 0 3px 3px}
.bni-ic{width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.bni.on .bni-ic{transform:scale(1.1)}
.bni svg{width:22px;height:22px;fill:currentColor}
.bni.on svg{filter:drop-shadow(0 0 6px rgba(0,200,83,0.5))}
</style>
</head>
<body>

<div class="topbar">
  <button class="tb-back" onclick="location.href='/'">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Home
  </button>
  <div class="tb-title">My Bets</div>
  <div class="tb-bal">KES <span id="balTop">0.00</span></div>
</div>

<div class="ftabs">
  <div class="ftab on" onclick="filter('all',this)">All</div>
  <div class="ftab" onclick="filter('pending',this)">Pending</div>
  <div class="ftab" onclick="filter('won',this)">Won</div>
  <div class="ftab" onclick="filter('lost',this)">Lost</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="sTotal">0</div><div class="stat-lbl">Total Bets</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--g)" id="sWon">0</div><div class="stat-lbl">Won</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--yl)" id="sWin">0.00</div><div class="stat-lbl">Winnings</div></div>
</div>

<div class="bets" id="betsList">
  <div class="loading"><div class="spin"></div>Loading your bets...</div>
</div>

<nav class="bnav">
  <div class="bni" onclick="location.href='/'"><div class="bni-ic"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>Home</div>
  <div class="bni" onclick="location.href='/pages/aviator.html'"><div class="bni-ic"><svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg></div>Aviator</div>
  <div class="bni on"><div class="bni-ic"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg></div>My Bets</div>
  <div class="bni" onclick="location.href='/pages/account.html'"><div class="bni-ic"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>Account</div>
</nav>

<script>
let allBets=[], USER=null;

window.addEventListener('DOMContentLoaded',async()=>{
  const t=localStorage.getItem('token'), u=localStorage.getItem('user');
  if(!t||!u){location.href='/pages/login.html';return}
  USER=JSON.parse(u);
  document.getElementById('balTop').textContent=parseFloat(USER.balance||0).toFixed(2);
  await loadBets();
});

async function loadBets(){
  try{
    const r=await fetch('/api/bets/my',{headers:{'Authorization':'Bearer '+localStorage.getItem('token')}});
    const d=await r.json();
    if(!d.success){renderEmpty();return}
    allBets=d.data;
    // Stats
    const won=allBets.filter(b=>b.status==='won');
    const totalWin=won.reduce((a,b)=>a+(b.netPayout||0),0);
    document.getElementById('sTotal').textContent=allBets.length;
    document.getElementById('sWon').textContent=won.length;
    document.getElementById('sWin').textContent=totalWin.toFixed(0);
    renderBets(allBets);
  }catch{document.getElementById('betsList').innerHTML='<div class="loading">Failed to load bets.</div>'}
}

function filter(f,el){
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderBets(f==='all'?allBets:allBets.filter(b=>b.status===f));
}

function renderBets(bets){
  const el=document.getElementById('betsList');
  if(!bets.length){renderEmpty();return}
  el.innerHTML=bets.map(bet=>{
    const d=new Date(bet.placedAt);
    const date=d.toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'});
    const time=d.toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'});
    const pClass={won:'pill-won',lost:'pill-lost',pending:'pill-pending',void:'pill-void'}[bet.status]||'pill-pending';
    const sels=bet.selections.map(s=>{
      const rc=s.result==='won'?'sr-won':s.result==='lost'?'sr-lost':'sr-pending';
      const ri=s.result==='won'?'✓':s.result==='lost'?'✗':'•';
      return `<div class="sel-row">
        <div><div class="sel-match">${s.homeTeam} vs ${s.awayTeam}</div>
        <div class="sel-pick">${s.pickLabel}<span class="sel-result ${rc}">${ri}</span></div></div>
        <div class="sel-odd">${s.odds.toFixed(2)}</div>
      </div>`;
    }).join('');
    return `<div class="bcard">
      <div class="bcard-head">
        <div><div class="bcard-code">${bet.betCode}</div><div class="bcard-date">${date} · ${time}</div></div>
        <span class="pill ${pClass}">${bet.status.charAt(0).toUpperCase()+bet.status.slice(1)}</span>
      </div>
      <div class="sels">${sels}</div>
      <div class="bcard-foot">
        <div class="bf"><div class="bf-lbl">Picks</div><div class="bf-val">${bet.selections.length}</div></div>
        <div class="bf"><div class="bf-lbl">Odds</div><div class="bf-val" style="color:var(--yl)">${bet.totalOdds.toFixed(2)}</div></div>
        <div class="bf"><div class="bf-lbl">Stake</div><div class="bf-val">KES ${bet.stake}</div></div>
        <div class="bf"><div class="bf-lbl">${bet.status==='won'?'Won':'Pot.Win'}</div>
          <div class="bf-val" style="color:var(--g)">KES ${bet.status==='won'?(bet.netPayout||0).toFixed(0):(bet.potentialWin||0).toFixed(0)}</div></div>
      </div>
    </div>`;
  }).join('');
}

function renderEmpty(){
  document.getElementById('betsList').innerHTML=`
    <div class="empty">
      <div class="empty-ic">📋</div>
      <div class="empty-ttl">No bets yet</div>
      <div class="empty-sub">Pick a match and place your first bet to get started!</div>
      <button class="empty-btn" onclick="location.href='/'">Browse Matches</button>
    </div>`;
}
</script>
</body>
</html>
