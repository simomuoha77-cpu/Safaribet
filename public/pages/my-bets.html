<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Bets – SafariBet</title>
<script src="/js/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--g:#00c853;--g2:#00e65c;--bg:#080c08;--s1:#0d120d;--s2:#131a13;--s3:#192019;--bd:rgba(0,200,83,0.08);--tx:#e0f0e0;--mt:#4a6a4a;--yl:#ffd600;--rd:#ff3b3b;--bn:62px;--hdr:rgba(8,12,8,0.98)}
html[data-theme="light"]{--g:#00a844;--g2:#00c853;--bg:#f4f7f4;--s1:#ffffff;--s2:#eef3ee;--s3:#e4ece4;--bd:rgba(0,140,58,0.18);--tx:#14231a;--mt:#5c7a63;--yl:#b8860b;--rd:#d32f2f;--hdr:rgba(255,255,255,0.98)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:calc(var(--bn)+16px);transition:background 0.2s,color 0.2s}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--hdr);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;backdrop-filter:blur(20px)}
.tb-back{font-size:14px;color:var(--mt);background:none;border:none;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px}
.tb-back svg{width:16px;height:16px;fill:currentColor}
.tb-title{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700}
.tb-bal{font-size:13px;font-weight:800;color:var(--g)}

/* FILTER TABS */
.ftabs{display:flex;background:var(--hdr);border-bottom:1px solid var(--bd);position:sticky;top:52px;z-index:49;backdrop-filter:blur(10px)}
.ftab{flex:1;padding:12px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.3px}
.ftab.on{color:var(--g);border-bottom-color:var(--g)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 12px 8px}
.stat{background:linear-gradient(135deg,rgba(19,26,19,0.95),rgba(13,18,13,0.98));border:1px solid var(--bd);border-radius:12px;padding:14px 10px;text-align:center}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;line-height:1}
.stat-lbl{font-size:10px;color:var(--mt);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}

/* BET CARDS */
.bets{padding:0 12px}
.bcard{background:linear-gradient(135deg,var(--s2),var(--s1));border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden}
.bcard-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid rgba(0,200,83,0.05)}
.bcard-left{}
.bcard-code{font-size:13px;font-weight:800;color:var(--tx);font-family:'Rajdhani',sans-serif;letter-spacing:0.5px}
.bcard-date{font-size:11px;color:var(--mt);margin-top:2px}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700}
.pill-pending{background:rgba(255,214,0,0.1);color:var(--yl);border:1px solid rgba(255,214,0,0.2)}
.pill-won{background:rgba(0,200,83,0.1);color:var(--g);border:1px solid rgba(0,200,83,0.2)}
.pill-lost{background:rgba(255,59,59,0.08);color:var(--rd);border:1px solid rgba(255,59,59,0.15)}
.pill-void{background:rgba(100,100,100,0.1);color:#666;border:1px solid rgba(100,100,100,0.15)}

.sels{padding:10px 14px}
.sel-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,200,83,0.04)}
.sel-row:last-child{border:none}
.sel-match{font-size:13px;font-weight:600}
.sel-pick{font-size:11px;color:var(--mt);margin-top:2px;display:flex;align-items:center;gap:5px}
.sel-result{font-size:10px;font-weight:800;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
.sr-won{background:rgba(0,200,83,0.15);color:var(--g)}
.sr-lost{background:rgba(255,59,59,0.1);color:var(--rd)}

/* Redesigned selection row */
.sel-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.sel-row:last-child{border-bottom:none}
.sel-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sel-icon.won{background:rgba(0,200,83,0.12);border:1.5px solid rgba(0,200,83,0.3)}
.sel-icon.lost{background:rgba(255,59,59,0.08);border:1.5px solid rgba(255,59,59,0.2)}
.sel-icon.pending{background:rgba(255,214,0,0.08);border:1.5px solid rgba(255,214,0,0.2)}
.sel-icon.void{background:rgba(150,150,150,0.1);border:1.5px solid rgba(150,150,150,0.2)}
.sel-body{flex:1;min-width:0}
.sel-match{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sel-detail{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.sel-league{font-size:10px;color:var(--mt)}
.sel-pick-lbl{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.sel-pick-lbl.won{background:rgba(0,200,83,0.1);color:var(--g)}
.sel-pick-lbl.lost{background:rgba(255,59,59,0.08);color:var(--rd)}
.sel-pick-lbl.pending{background:rgba(255,214,0,0.08);color:var(--yl)}
.sel-pick-lbl.void{background:rgba(150,150,150,0.1);color:var(--mt)}
.sel-score{font-size:10px;color:var(--mt);font-weight:600}
.sel-odds{font-size:13px;font-weight:800;color:var(--yl);flex-shrink:0}
.sr-pending{background:rgba(255,214,0,0.1);color:var(--yl)}
.sel-odd{font-size:15px;font-weight:800;color:var(--g)}

.bcard-foot{display:grid;grid-template-columns:repeat(4,1fr);background:rgba(0,200,83,0.03);border-top:1px solid rgba(0,200,83,0.05)}
.cashout-row{padding:10px 12px;border-top:1px solid var(--bd)}
.cashout-btn{width:100%;padding:10px;background:rgba(255,214,0,0.1);border:1px solid rgba(255,214,0,0.3);border-radius:8px;color:var(--yl);font-weight:700;font-size:12px;cursor:pointer}
.cashout-loading{text-align:center;font-size:12px;color:var(--mt);padding:6px 0}
.cashout-unavailable{text-align:center;font-size:12px;color:var(--mt);padding:6px 0}
.cashout-quote{text-align:center;padding:6px 0}
.cashout-quote-val{font-size:22px;font-weight:800;color:var(--g);font-family:'Rajdhani',sans-serif}
.cashout-quote-sub{font-size:10px;color:var(--mt);margin-bottom:10px}
.cashout-confirm-btn{width:100%;padding:11px;background:var(--g);border:none;border-radius:8px;color:#04140a;font-weight:800;font-size:13px;cursor:pointer;margin-bottom:6px}
.cashout-cancel-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--bd);border-radius:8px;color:var(--mt);font-size:12px;cursor:pointer}
.bf{padding:10px 8px;text-align:center;border-right:1px solid rgba(0,200,83,0.05)}
.bf:last-child{border:none}
.bf-lbl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:0.3px;font-weight:700}
.bf-val{font-size:13px;font-weight:800;margin-top:3px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px}
.empty-ic{font-size:56px;margin-bottom:16px}
.empty-ttl{font-size:18px;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--mt);line-height:1.6}
.empty-btn{display:inline-block;margin-top:20px;padding:13px 28px;background:linear-gradient(135deg,#00e65c,#00c853);color:#000;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;border:none;box-shadow:0 4px 16px rgba(0,200,83,0.3)}

/* LOADING */
.spin{width:30px;height:30px;border:3px solid rgba(0,200,83,0.1);border-top-color:var(--g);border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:50px;color:var(--mt);font-size:14px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:199;background:var(--hdr);border-top:1px solid var(--bd);display:flex;height:var(--bn);backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--mt);cursor:pointer;gap:2px;transition:all 0.2s;position:relative;padding:6px 0;text-transform:uppercase;letter-spacing:0.3px}
.bni.on{color:var(--g)}
.bni.on::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--g);border-radius:0 0 3px 3px}
.bni-ic{width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.bni.on .bni-ic{transform:scale(1.1)}
.bni svg{width:22px;height:22px;fill:currentColor}
.bni.on svg{filter:drop-shadow(0 0 6px rgba(0,200,83,0.5))}
</style>
</head>
<body>

<div class="topbar">
  <button class="tb-back" onclick="location.href='/'">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Home
  </button>
  <div class="tb-title">My Bets</div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="tb-bal">KES <span id="balTop">0.00</span></div>
    <button onclick="settleBets()" id="settleBtn" title="Check results & settle pending bets"
      style="background:rgba(0,200,83,0.1);border:1px solid rgba(0,200,83,0.2);color:var(--g);
             border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer">
      🔄 Settle
    </button>
  </div>
</div>

<div class="ftabs">
  <div class="ftab on" onclick="filter('all',this)">All</div>
  <div class="ftab" onclick="filter('pending',this)">Pending</div>
  <div class="ftab" onclick="filter('won',this)">Won</div>
  <div class="ftab" onclick="filter('lost',this)">Lost</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="sTotal">0</div><div class="stat-lbl">Total Bets</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--g)" id="sWon">0</div><div class="stat-lbl">Won</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--yl)" id="sWin">0.00</div><div class="stat-lbl">Winnings</div></div>
</div>

<div class="bets" id="betsList">
  <div class="loading"><div class="spin"></div>Loading your bets...</div>
</div>

<nav class="bnav">
  <div class="bni" onclick="location.href='/'"><div class="bni-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>Home</div>
  <div class="bni" onclick="location.href='/casino'"><div class="bni-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v16H4V4zm4 4v2h2V8H8zm6 0v2h2V8h-2zm-6 6v2h2v-2H8zm6 0v2h2v-2h-2zm-3-3v2h2v-2h-2z"/></svg></div>Casino</div>
  <div class="bni on"><div class="bni-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg></div>My Bets</div>
  <div class="bni" onclick="location.href='/account'"><div class="bni-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>Account</div>
</nav>

<script>
let allBets=[], USER=null;

window.addEventListener('DOMContentLoaded',async()=>{
  const t=localStorage.getItem('token'), u=localStorage.getItem('user');
  if(!t||!u){location.href='/login';return}
  USER=JSON.parse(u);
  document.getElementById('balTop').textContent=parseFloat(USER.balance||0).toFixed(2);
  refreshBalance();
  await loadBets();
});

// Same live wallet fetch used on the homepage and Account — keeps this page's
// header in sync with the real balance instead of the snapshot cached at login.
async function refreshBalance(){
  try{
    const r=await fetch('/api/wallet/balance',{headers:{'Authorization':'Bearer '+localStorage.getItem('token')}});
    const d=await r.json();
    if(d.success){
      document.getElementById('balTop').textContent=parseFloat(d.data.spendable).toFixed(2);
      USER.balance=d.data.spendable; localStorage.setItem('user',JSON.stringify(USER));
    }
  }catch(e){}
}
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) refreshBalance(); });

async function loadBets(){
  try{
    const r=await fetch('/api/bets/my',{headers:{'Authorization':'Bearer '+localStorage.getItem('token')}});
    const d=await r.json();
    if(!d.success){renderEmpty();return}
    allBets=d.data;
    // Stats
    const won=allBets.filter(b=>b.status==='won');
    const totalWin=won.reduce((a,b)=>a+(b.netPayout||0),0);
    document.getElementById('sTotal').textContent=allBets.length;
    document.getElementById('sWon').textContent=won.length;
    document.getElementById('sWin').textContent=totalWin.toFixed(0);
    renderBets(allBets);
  }catch{document.getElementById('betsList').innerHTML='<div class="loading">Failed to load bets.</div>'}
}

function filter(f,el){
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderBets(f==='all'?allBets:allBets.filter(b=>b.status===f));
}

function renderBets(bets){
  const el=document.getElementById('betsList');
  if(!bets.length){renderEmpty();return}
  el.innerHTML=bets.map(bet=>{
    const d=new Date(bet.placedAt || bet.createdAt);
    const date=d.toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'});
    const time=d.toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'});
    const pClass={won:'pill-won',lost:'pill-lost',pending:'pill-pending',void:'pill-void'}[bet.status]||'pill-pending';
    const sels=bet.selections.map(s=>{
      const r = s.result || 'pending';
      const iconHtml =
        r==='won'    ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="none"><circle cx="12" cy="12" r="11" fill="rgba(0,200,83,0.2)" stroke="#00c853" stroke-width="1.5"/><path d="M7 12.5l3.5 3.5 6.5-7" stroke="#00c853" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' :
        r==='lost'   ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="none"><circle cx="12" cy="12" r="11" fill="rgba(255,59,59,0.12)" stroke="#ff3b3b" stroke-width="1.5"/><path d="M8 8l8 8M16 8l-8 8" stroke="#ff3b3b" stroke-width="2.2" stroke-linecap="round"/></svg>' :
        r==='void'   ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="none"><circle cx="12" cy="12" r="11" fill="rgba(150,150,150,0.1)" stroke="#666" stroke-width="1.5"/><path d="M8 12h8" stroke="#999" stroke-width="2.2" stroke-linecap="round"/></svg>' :
        '<svg viewBox="0 0 24 24" width="18" height="18" fill="none"><circle cx="12" cy="12" r="11" fill="rgba(255,214,0,0.08)" stroke="#ffd600" stroke-width="1.5"/><circle cx="12" cy="12" r="3" fill="#ffd600"/></svg>';
      const scoreStr = (s.score?.home !== null && s.score?.home !== undefined && s.score?.away !== null)
        ? `${s.score.home} - ${s.score.away}` : '';
      return `<div class="sel-row">
        <div class="sel-icon ${r}">${iconHtml}</div>
        <div class="sel-body">
          <div class="sel-match">${s.homeTeam} vs ${s.awayTeam}</div>
          <div class="sel-detail">
            <span class="sel-pick-lbl ${r}">${
              r==='void' ? '↩ Void – Refunded' :
              r==='pending' ? (s.pickLabel||s.pick) + ' ⏳' :
              (s.pickLabel||s.pick)
            }</span>
            ${scoreStr ? `<span class="sel-score">FT: ${scoreStr}</span>` : ''}
            ${s.league ? `<span class="sel-league">${s.league}</span>` : ''}
          </div>
        </div>
        <div class="sel-odds">${(s.odds||0).toFixed(2)}</div>
      </div>`;
    }).join('');
    return `<div class="bcard">
      <div class="bcard-head">
        <div><div class="bcard-code">${bet.betCode}</div><div class="bcard-date">${date} · ${time}</div></div>
        <span class="pill ${pClass}">${bet.status.charAt(0).toUpperCase()+bet.status.slice(1)}</span>
      </div>
      <div class="sels">${sels}</div>
      ${bet.selections.some(s=>s.result==='void') ? `<div style="font-size:11px;color:#999;padding:6px 12px;background:rgba(150,150,150,0.06);border-top:1px solid var(--bd)">↩ One or more games were voided (result unavailable) — those legs do not count against your bet</div>` : ''}
      <div class="bcard-foot">
        <div class="bf"><div class="bf-lbl">Picks</div><div class="bf-val">${bet.selections.length}</div></div>
        <div class="bf"><div class="bf-lbl">Odds</div><div class="bf-val" style="color:var(--yl)">${bet.totalOdds.toFixed(2)}</div></div>
        <div class="bf"><div class="bf-lbl">Stake</div><div class="bf-val">KES ${bet.stake}</div></div>
        <div class="bf"><div class="bf-lbl">${bet.status==='won'?'Won':'Pot.Win'}</div>
          <div class="bf-val" style="color:var(--g)">KES ${bet.status==='won'?(bet.netPayout||0).toFixed(0):(bet.potentialWin||0).toFixed(0)}</div></div>
      </div>
      ${bet.status==='pending' && !bet.selections.some(s=>s.result==='lost') ? `
      <div class="cashout-row" id="co_${bet.betCode}">
        <button class="cashout-btn" onclick="loadCashoutQuote('${bet.betCode}')">💰 Check Cash Out Value</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function authHeaders(){ return {'Authorization':'Bearer '+localStorage.getItem('token')}; }

// ── CASH OUT ──
async function loadCashoutQuote(code){
  const el = document.getElementById(`co_${code}`);
  el.innerHTML = '<div class="cashout-loading">Checking live value...</div>';
  try{
    const r = await fetch(`/api/bets/${code}/cashout-quote`, { headers: authHeaders() });
    const d = await r.json();
    if (!d.success || !d.eligible) {
      el.innerHTML = `<div class="cashout-unavailable">${d.reason || 'Cash out not available for this bet right now'}</div>`;
      return;
    }
    el.innerHTML = `
      <div class="cashout-quote">
        <div class="cashout-quote-val">KES ${d.cashOutValue.toFixed(2)}</div>
        <div class="cashout-quote-sub">Live value based on current match states</div>
        <button class="cashout-confirm-btn" onclick="confirmCashout('${code}')">Cash Out Now</button>
        <button class="cashout-cancel-btn" onclick="loadBets()">Cancel</button>
      </div>`;
  }catch(e){
    el.innerHTML = '<div class="cashout-unavailable">Could not check cash out value — try again</div>';
  }
}

async function confirmCashout(code){
  if (!confirm('Cash out now? This locks in the current value and cannot be undone.')) return;
  try{
    const r = await fetch(`/api/bets/${code}/cashout`, { method:'POST', headers: authHeaders() });
    const d = await r.json();
    if (d.success) {
      alert(`✅ Cashed out KES ${(d.cashOutAmount||0).toFixed(2)}`);
      loadBets();
    } else {
      alert('❌ ' + (d.message || 'Cash out failed'));
    }
  }catch(e){
    alert('❌ Cash out failed — check connection');
  }
}

function renderEmpty(){
  document.getElementById('betsList').innerHTML=`
    <div class="empty">
      <div class="empty-ic">📋</div>
      <div class="empty-ttl">No bets yet</div>
      <div class="empty-sub">Pick a match and place your first bet to get started!</div>
      <button class="empty-btn" onclick="location.href='/'">Browse Matches</button>
    </div>`;
}

async function settleBets(){
  const btn=document.getElementById('settleBtn');
  btn.textContent='⏳...';btn.disabled=true;
  try{
    const token=localStorage.getItem('token');
    // Try user settle first (no password needed)
    const r=await fetch('/api/bets/settle',{
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}
    });
    const d=await r.json();
    if(d.success){
      const msg = d.settled>0
        ? `✅ ${d.settled} bets settled!`
        : '✅ No pending bets to settle right now';
      showToast(msg,'ok');
      setTimeout(()=>location.reload(),1500);
    } else {
      showToast('Could not settle: '+d.message,'err');
    }
  }catch(e){ showToast('Error: '+e.message,'err'); }
  btn.textContent='🔄 Settle';btn.disabled=false;
}
</script>
</body>
</html>
