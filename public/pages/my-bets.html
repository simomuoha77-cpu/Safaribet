<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>My Bets — BetaKE</title>
<link rel="icon" href="/favicon.ico"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--g:#00c853;--yl:#ffd600;--bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--tx:#f0f0f0;--mt:#888;--rd:#ff3b3b}
  body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',sans-serif;min-height:100vh;padding-bottom:80px}

  /* Header */
  .hdr{background:#0d0d0d;border-bottom:1px solid #1e1e1e;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
  .back{width:36px;height:36px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;border:none;color:var(--tx)}
  .hdr-title{font-size:17px;font-weight:700}
  .hdr-bal{margin-left:auto;background:rgba(0,200,83,0.12);border:1px solid rgba(0,200,83,0.3);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--g)}

  /* Tabs */
  .tabs{display:flex;background:#111;border-bottom:1px solid #1e1e1e;position:sticky;top:61px;z-index:99}
  .tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:600;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
  .tab.on{color:var(--g);border-bottom-color:var(--g)}

  /* Summary bar */
  .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#1e1e1e;margin:12px}
  .scard{background:#111;padding:12px;text-align:center;border-radius:8px}
  .scard-val{font-size:18px;font-weight:800;font-family:'Rajdhani',sans-serif}
  .scard-lbl{font-size:10px;color:var(--mt);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
  .scard-val.won{color:var(--g)}
  .scard-val.lost{color:var(--rd)}
  .scard-val.pending{color:var(--yl)}

  /* Bet cards */
  .bets-list{padding:0 12px}
  .bet-card{background:#111;border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid #1e1e1e}
  .bet-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
  .bet-code{font-size:11px;color:var(--mt);font-family:monospace}
  .bet-date{font-size:11px;color:var(--mt)}
  .status-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase}
  .status-badge.pending{background:rgba(255,214,0,.12);color:var(--yl);border:1px solid rgba(255,214,0,.3)}
  .status-badge.won{background:rgba(0,200,83,.12);color:var(--g);border:1px solid rgba(0,200,83,.3)}
  .status-badge.lost{background:rgba(255,59,59,.12);color:var(--rd);border:1px solid rgba(255,59,59,.3)}
  .status-badge.cancelled{background:rgba(136,136,136,.12);color:#888;border:1px solid rgba(136,136,136,.3)}

  .bet-selections{padding:10px 14px}
  .sel-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1a1a1a}
  .sel-row:last-child{border-bottom:none}
  .sel-match{flex:1}
  .sel-teams{font-size:13px;font-weight:600;color:var(--tx)}
  .sel-pick{font-size:11px;color:var(--mt);margin-top:2px}
  .sel-result{font-size:11px;margin-top:2px}
  .sel-result.correct{color:var(--g)}
  .sel-result.wrong{color:var(--rd)}
  .sel-result.pending{color:var(--yl)}
  .sel-odds{font-size:14px;font-weight:700;color:var(--yl);font-family:'Rajdhani',sans-serif;margin-left:8px}

  .bet-footer{padding:10px 14px;background:#0d0d0d;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
  .bf-item{text-align:center}
  .bf-val{font-size:14px;font-weight:700;font-family:'Rajdhani',sans-serif}
  .bf-lbl{font-size:10px;color:var(--mt);text-transform:uppercase}
  .bf-val.payout{color:var(--g)}
  .bf-val.stake{color:var(--tx)}

  /* Empty */
  .empty{padding:60px 20px;text-align:center}
  .empty-icon{font-size:48px;margin-bottom:12px}
  .empty-title{font-size:16px;font-weight:700;margin-bottom:6px}
  .empty-sub{font-size:13px;color:var(--mt)}
  .empty-btn{display:inline-block;margin-top:16px;padding:10px 24px;background:var(--g);color:#000;border-radius:8px;font-weight:700;font-size:13px;text-decoration:none}

  /* Loading */
  .loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:12px;color:var(--mt)}
  .spin{width:32px;height:32px;border:3px solid #222;border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Bottom nav */
  .bnav{position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:1px solid #1e1e1e;display:flex;z-index:200}
  .bni{flex:1;padding:10px 0 8px;text-align:center;cursor:pointer;color:var(--mt);font-size:10px;font-weight:600}
  .bni.on{color:var(--g)}
  .bni-ic{font-size:20px;margin-bottom:2px}

  /* Toast */
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
  .toast.on{opacity:1}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <button class="back" onclick="history.back()">←</button>
  <span class="hdr-title">📋 My Bets</span>
  <div class="hdr-bal" id="balPill">KES 0.00</div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab on" onclick="switchTab('all')"    id="tab-all">All</div>
  <div class="tab"    onclick="switchTab('pending')" id="tab-pending">Pending <span id="pendingCount" style="display:none;background:var(--yl);color:#000;border-radius:10px;padding:0 5px;font-size:10px;margin-left:3px"></span></div>
  <div class="tab"    onclick="switchTab('won')"     id="tab-won">Won</div>
  <div class="tab"    onclick="switchTab('lost')"    id="tab-lost">Lost</div>
</div>

<!-- Summary -->
<div class="summary" id="summary" style="display:none">
  <div class="scard"><div class="scard-val" id="sTotalBets">0</div><div class="scard-lbl">Total Bets</div></div>
  <div class="scard"><div class="scard-val won" id="sTotalWon">0</div><div class="scard-lbl">Won</div></div>
  <div class="scard"><div class="scard-val pending" id="sTotalStaked">KES 0</div><div class="scard-lbl">Total Staked</div></div>
</div>

<!-- Bet List -->
<div class="bets-list" id="betsList">
  <div class="loading"><div class="spin"></div>Loading bets...</div>
</div>

<!-- Bottom Nav -->
<div class="bnav">
  <div class="bni" onclick="location.href='/'"><div class="bni-ic">🏠</div>Home</div>
  <div class="bni" onclick="location.href='/pages/aviator.html'"><div class="bni-ic">✈️</div>Aviator</div>
  <div class="bni on"><div class="bni-ic">📋</div>My Bets</div>
  <div class="bni" onclick="location.href='/pages/account.html'"><div class="bni-ic">👤</div>Account</div>
</div>

<div class="toast" id="toast"></div>

<script>
let allBets   = [];
let activeTab = 'all';
const TOKEN   = localStorage.getItem('token');
const USER    = JSON.parse(localStorage.getItem('user') || 'null');

// ── Init ──
if (!TOKEN || !USER) {
  location.href = '/pages/login.html';
}

document.getElementById('balPill').textContent = 'KES ' + parseFloat(USER?.balance || 0).toFixed(2);

// Try multiple endpoint patterns since server structure varies
const BET_ENDPOINTS = [
  '/api/bets/history',
  '/api/bets/my-bets',
  '/api/bets/user',
  '/api/bets',
];

async function loadBets() {
  const headers = { 'Authorization': 'Bearer ' + TOKEN };
  let lastError = 'No bets endpoint found';

  for (const endpoint of BET_ENDPOINTS) {
    try {
      const r = await fetch(endpoint, { headers });
      if (!r.ok && r.status === 404) continue; // try next
      const d = await r.json();

      // Handle various response shapes: {bets:[]}, {data:[]}, direct array
      const bets = d.bets || d.data || d.history || (Array.isArray(d) ? d : null);
      if (bets !== null && (d.success !== false)) {
        allBets = bets;
        buildSummary();
        renderBets();
        return; // success — stop trying
      }
      // If success:false, save error and try next endpoint
      lastError = d.message || 'Failed';
    } catch (e) {
      lastError = e.message;
    }
  }

  // All endpoints failed
  document.getElementById('betsList').innerHTML =
    `<div class="empty">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">Failed to load</div>
      <div class="empty-sub">${lastError}</div>
      <div style="margin-top:16px;font-size:11px;color:#555;background:#111;padding:10px;border-radius:8px;text-align:left">
        <strong style="color:#888">Fix:</strong> Add this route to your <code>server/routes/bets.js</code>
        <strong>before</strong> the <code>/:id</code> route:<br/><br/>
        <code style="color:#4caf50">router.get('/history', auth, async (req,res) => {<br/>
          &nbsp;const bets = await Bet.find({userId: req.user.id || req.user._id})<br/>
          &nbsp;&nbsp;.sort({createdAt:-1}).limit(100).lean();<br/>
          &nbsp;res.json({success:true, bets});<br/>
        });</code>
      </div>
    </div>`;
}

function buildSummary() {
  const won     = allBets.filter(b => b.status === 'won').length;
  const staked  = allBets.reduce((s, b) => s + (b.stake || 0), 0);
  document.getElementById('sTotalBets').textContent  = allBets.length;
  document.getElementById('sTotalWon').textContent   = won;
  document.getElementById('sTotalStaked').textContent= 'KES ' + staked.toFixed(0);
  if (allBets.length) document.getElementById('summary').style.display = 'grid';

  const pending = allBets.filter(b => b.status === 'pending').length;
  const badge   = document.getElementById('pendingCount');
  if (pending) { badge.textContent = pending; badge.style.display = 'inline'; }
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById(`tab-${tab}`).classList.add('on');
  renderBets();
}

function renderBets() {
  const filtered = activeTab === 'all'
    ? allBets
    : allBets.filter(b => b.status === activeTab);

  const el = document.getElementById('betsList');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">${activeTab==='won'?'🏆':activeTab==='lost'?'😔':'📋'}</div>
      <div class="empty-title">No ${activeTab==='all'?'':activeTab} bets yet</div>
      <div class="empty-sub">${activeTab==='all'?'Place your first bet to get started':'Check another tab'}</div>
      ${activeTab==='all'?`<a class="empty-btn" href="/">Browse Matches</a>`:''}
    </div>`;
    return;
  }

  el.innerHTML = filtered.map(b => renderBetCard(b)).join('');
}

function renderBetCard(bet) {
  const date      = new Date(bet.createdAt);
  const dateStr   = date.toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'});
  const timeStr   = date.toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'});
  const status    = bet.status || 'pending';
  const totalOdds = bet.totalOdds || (bet.selections||[]).reduce((p,s)=>p*(s.odds||1),1);
  const potWin    = (bet.potentialWin || bet.stake * totalOdds).toFixed(2);
  const payout    = (bet.payout || 0).toFixed(2);

  const selRows = (bet.selections || []).map(s => {
    const pick    = s.pick === 'home' ? s.homeTeam : s.pick === 'away' ? s.awayTeam : 'Draw';
    let resultCls = 'pending', resultTxt = '⏳ Pending';
    if (s.result) {
      const correct = s.pick === s.result;
      resultCls = correct ? 'correct' : 'wrong';
      resultTxt = correct ? '✅ Won' : '❌ Lost';
    }
    return `<div class="sel-row">
      <div class="sel-match">
        <div class="sel-teams">${s.homeTeam} vs ${s.awayTeam}</div>
        <div class="sel-pick">Pick: <strong>${pick}</strong> · ${s.league||''}</div>
        <div class="sel-result ${resultCls}">${resultTxt}</div>
      </div>
      <div class="sel-odds">${parseFloat(s.odds||1).toFixed(2)}</div>
    </div>`;
  }).join('');

  const footerRight = status === 'won'
    ? `<div class="bf-item"><div class="bf-val payout">KES ${payout}</div><div class="bf-lbl">Paid Out</div></div>`
    : status === 'pending'
    ? `<div class="bf-item"><div class="bf-val" style="color:var(--yl)">KES ${potWin}</div><div class="bf-lbl">Potential Win</div></div>`
    : `<div class="bf-item"><div class="bf-val" style="color:var(--mt)">KES ${bet.stake?.toFixed(2)||'0.00'}</div><div class="bf-lbl">Lost</div></div>`;

  return `<div class="bet-card">
    <div class="bet-header">
      <div>
        <div class="bet-code">${bet.betCode || bet._id?.slice(-8).toUpperCase() || 'BET'}</div>
        <div class="bet-date">${dateStr} · ${timeStr}</div>
      </div>
      <span class="status-badge ${status}">${status}</span>
    </div>
    <div class="bet-selections">${selRows}</div>
    <div class="bet-footer">
      <div class="bf-item">
        <div class="bf-val stake">KES ${(bet.stake||0).toFixed(2)}</div>
        <div class="bf-lbl">Stake</div>
      </div>
      <div class="bf-item">
        <div class="bf-val" style="color:var(--yl)">${parseFloat(totalOdds).toFixed(2)}</div>
        <div class="bf-lbl">Total Odds</div>
      </div>
      ${footerRight}
    </div>
  </div>`;
}

loadBets();

function showT(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='err'?'#c62828':'#1b5e20';
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'), 3000);
}
</script>
</body>
</html>
