<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login – BetaKE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1f0f;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:32px;font-weight:900;color:#4caf50}
.logo h1 span{color:#f5c518}
.logo p{color:#4caf50aa;font-size:13px;margin-top:4px}
.card{background:#111;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;border:1px solid #1e3a1e}
.err{background:#ff17441a;border:1px solid #ff174444;color:#ff6b6b;padding:12px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;text-align:center}
.ok{background:#4caf5011;border:1px solid #4caf5044;color:#4caf50;padding:12px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;text-align:center}
label{display:block;font-size:11px;font-weight:700;color:#888;letter-spacing:1px;margin-bottom:6px;margin-top:16px}
input{width:100%;background:#1a1a1a;border:1.5px solid #2a2a2a;border-radius:12px;padding:15px;color:#fff;font-size:16px;outline:none;transition:border .2s}
input:focus{border-color:#4caf50}
.hint{font-size:11px;color:#555;margin-top:5px}
.btn{width:100%;background:#4caf50;color:#000;border:none;border-radius:12px;padding:16px;font-size:17px;font-weight:800;cursor:pointer;margin-top:20px;transition:background .2s}
.btn:hover{background:#43a047}
.btn:disabled{background:#2a4a2a;color:#555;cursor:not-allowed}
.footer{text-align:center;margin-top:16px;font-size:13px;color:#555}
.footer a{color:#4caf50;text-decoration:none;font-weight:600}
.back{display:flex;align-items:center;gap:6px;color:#555;font-size:13px;margin-bottom:20px;cursor:pointer}
.back:hover{color:#4caf50}
h2{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px}
.sub{font-size:13px;color:#555;margin-bottom:4px}
</style>
</head>
<body>

<div class="logo">
  <h1>Beta<span>KE</span></h1>
  <p>Kenya's Premier Betting Platform</p>
</div>

<div class="card">
  <div class="back" onclick="location.href='/'">← Back to Home</div>
  <h2>Welcome Back</h2>
  <p class="sub">Sign in to your account</p>

  <div class="err" id="err"></div>
  <div class="ok" id="ok"></div>

  <label>PHONE NUMBER OR USERNAME</label>
  <input type="text" id="identifier" placeholder="e.g. 0712345678 or john123" autocomplete="off"/>
  <div class="hint">Enter your phone number or username</div>

  <label>PASSWORD</label>
  <input type="password" id="password" placeholder="Your password" autocomplete="off"/>

  <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
</div>

<div class="footer">
  Don't have an account? <a href="/register">Create one free</a>
</div>

<script>
async function doLogin(){
  const btn        = document.getElementById('btn');
  const errEl      = document.getElementById('err');
  const okEl       = document.getElementById('ok');
  const identifier = document.getElementById('identifier').value.trim();
  const password   = document.getElementById('password').value;

  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if(!identifier || !password){
    return showErr('Please enter your phone/username and password');
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    // Send as both phone and username — server handles either
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: identifier, username: identifier, password })
    });

    const data = await res.json();

    if(data.success){
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      okEl.textContent = '✅ Welcome back! Redirecting...';
      okEl.style.display = 'block';
      setTimeout(()=> location.href = '/', 1000);
    } else {
      showErr(data.message || 'Wrong credentials');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch(e) {
    showErr('Network error. Check connection and try again.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function showErr(msg){
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
