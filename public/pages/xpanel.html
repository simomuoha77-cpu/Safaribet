<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--g:#00c853;--bg:#060a06;--s1:#0d120d;--s2:#141a14;--s3:#1a221a;--bd:rgba(0,200,83,0.1);--tx:#e8f5e9;--mt:#5a7a5a;--yl:#ffd600;--rd:#ff3b3b;--bl:#2196f3}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* LOGIN */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:32px 24px;width:100%;max-width:380px}
.login-logo{font-size:13px;font-weight:700;color:var(--mt);text-align:center;margin-bottom:24px;letter-spacing:2px;text-transform:uppercase}
.lfield{margin-bottom:14px}
.lfield label{display:block;font-size:12px;color:var(--mt);font-weight:600;margin-bottom:5px}
.lfield input{width:100%;background:var(--s3);border:1.5px solid var(--bd);border-radius:8px;padding:12px 14px;color:var(--tx);font-size:15px;outline:none}
.lfield input:focus{border-color:var(--g)}
.login-btn{width:100%;padding:13px;background:var(--g);color:#000;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.login-btn:disabled{background:var(--mt);cursor:not-allowed}
.lerr{background:rgba(255,59,59,0.1);border:1px solid rgba(255,59,59,0.3);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--rd);margin-bottom:12px;display:none}

/* PANEL */
#panel{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10}
.admin-logo{font-size:16px;font-weight:800;color:var(--g)}
.logout-a{font-size:13px;color:var(--mt);cursor:pointer;background:none;border:none}

/* TABS */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;font-size:13px;font-weight:600;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
.tab.on{color:var(--g);border-bottom-color:var(--g)}

/* CONTENT */
.content{padding:14px;max-width:900px;margin:0 auto}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.scard{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px}
.scard-val{font-size:26px;font-weight:800;color:var(--g)}
.scard-lbl{font-size:12px;color:var(--mt);margin-top:3px}

/* TABLE */
.tbl-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:14px}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bd)}
.tbl-title{font-size:14px;font-weight:700}
.tbl-search{background:var(--s3);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:13px;outline:none;width:160px}
.tbl-search::placeholder{color:var(--mt)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:0.3px;padding:8px 12px;border-bottom:1px solid var(--bd);text-align:left}
td{font-size:13px;padding:9px 12px;border-bottom:1px solid rgba(0,200,83,0.04)}
tr:last-child td{border:none}
tr:hover td{background:var(--s2)}

/* BADGES */
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.b-pending{background:rgba(255,214,0,0.12);color:var(--yl)}
.b-won{background:rgba(0,200,83,0.12);color:var(--g)}
.b-lost{background:rgba(255,59,59,0.12);color:var(--rd)}
.b-active{background:rgba(0,200,83,0.12);color:var(--g)}
.b-suspended{background:rgba(255,59,59,0.12);color:var(--rd)}
.b-void{background:rgba(100,100,100,0.2);color:#888}

/* ACTION BTNS */
.abtn{padding:5px 10px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.abtn.green{background:rgba(0,200,83,0.15);color:var(--g)}
.abtn.red{background:rgba(255,59,59,0.12);color:var(--rd)}
.abtn.blue{background:rgba(33,150,243,0.12);color:var(--bl)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:24px;width:100%;max-width:400px}
.modal-ttl{font-size:17px;font-weight:700;margin-bottom:16px}
.mfield{margin-bottom:12px}
.mfield label{display:block;font-size:12px;color:var(--mt);font-weight:600;margin-bottom:5px}
.mfield input,.mfield select,.mfield textarea{width:100%;background:var(--s3);border:1.5px solid var(--bd);border-radius:7px;padding:10px 12px;color:var(--tx);font-size:14px;outline:none}
.mfield input:focus,.mfield select:focus{border-color:var(--g)}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.mbtn{flex:1;padding:11px;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;border:none}
.mbtn.g{background:var(--g);color:#000}
.mbtn.r{background:rgba(255,59,59,0.15);color:var(--rd);border:1px solid rgba(255,59,59,0.3)}
.mbtn.cancel{background:var(--s3);color:var(--mt)}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px}
.pager{padding:6px 12px;background:var(--s3);border:1px solid var(--bd);border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--tx)}
.pager.on{background:var(--g);color:#000;border-color:var(--g)}
.pager:disabled{opacity:0.4;cursor:not-allowed}

/* TOAST */
.toast{position:fixed;top:16px;right:16px;background:var(--s3);border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;border:1px solid #444;max-width:300px}
.toast.on{opacity:1}
.toast.ok{border-color:var(--g);color:var(--g)}
.toast.err{border-color:var(--rd);color:var(--rd)}
.toast.info{border-color:var(--yl);color:var(--yl)}

.spin{width:24px;height:24px;border:3px solid var(--bd);border-top-color:var(--g);border-radius:50%;animation:sp 0.8s linear infinite;margin:30px auto}
@keyframes sp{to{transform:rotate(360deg)}}

.finance-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.fcard{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px;text-align:center}
.fcard-val{font-size:20px;font-weight:800}
.fcard-lbl{font-size:11px;color:var(--mt);margin-top:3px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🔒 Secure Access</div>
    <div class="lerr" id="loginErr"></div>
    <div class="lfield"><label>Username</label><input type="text" id="adminUser" placeholder="Admin username" autocomplete="off"/></div>
    <div class="lfield"><label>Password</label><input type="password" id="adminPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Access Panel</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="panel">
  <div class="topbar">
    <div class="admin-logo">⚙ BetaKE Admin</div>
    <button class="logout-a" onclick="adminLogout()">Logout ›</button>
  </div>

  <div class="tabs">
    <div class="tab on" onclick="switchTab('dashboard',this)">Dashboard</div>
    <div class="tab" onclick="switchTab('users',this)">Users</div>
    <div class="tab" onclick="switchTab('bets',this)">Bets</div>
    <div class="tab" onclick="switchTab('matches',this)">Matches</div>
    <div class="tab" onclick="switchTab('transactions',this)">Transactions</div>
    <div class="tab" onclick="switchTab('settlement',this)">Settlement</div>
  </div>

  <div class="content" id="content">
    <div class="spin"></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="balanceModal">
  <div class="modal">
    <div class="modal-ttl">Adjust Balance</div>
    <div class="mfield"><label>User</label><input id="balUser" disabled/></div>
    <div class="mfield"><label>Amount (+ to add, - to deduct)</label><input type="number" id="balAmount" placeholder="e.g. 500 or -100"/></div>
    <div class="mfield"><label>Reason</label><input id="balReason" placeholder="e.g. Bonus, Correction"/></div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal('balanceModal')">Cancel</button>
      <button class="mbtn g" onclick="submitBalance()">Apply</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="voidModal">
  <div class="modal">
    <div class="modal-ttl">Void Bet</div>
    <div class="mfield"><label>Bet Code</label><input id="voidCode" disabled/></div>
    <div class="mfield"><label>Reason</label><input id="voidReason" placeholder="Reason for voiding"/></div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal('voidModal')">Cancel</button>
      <button class="mbtn r" onclick="submitVoid()">Void & Refund</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="resultModal">
  <div class="modal">
    <div class="modal-ttl">Set Match Result</div>
    <div class="mfield"><label>Match</label><input id="resultMatch" disabled/></div>
    <div class="mfield">
      <label>Result</label>
      <select id="resultPick">
        <option value="home">Home Win (1)</option>
        <option value="draw">Draw (X)</option>
        <option value="away">Away Win (2)</option>
      </select>
    </div>
    <div class="mfield"><label>Home Score</label><input type="number" id="resHomeScore" placeholder="0"/></div>
    <div class="mfield"><label>Away Score</label><input type="number" id="resAwayScore" placeholder="0"/></div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal('resultModal')">Cancel</button>
      <button class="mbtn g" onclick="submitResult()">Set & Settle</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let ATOKEN   = null;
let APATH    = null;
let curPage  = { users:1, bets:1, transactions:1 };
let curTab   = 'dashboard';
let selUser  = null, selBet = null, selMatch = null;

// ── DETECT ADMIN PATH ──
// The admin path is the current page's directory
// e.g. /pages/xpanel.html -> API is at /api/xpanel
window.addEventListener('DOMContentLoaded', () => {
  APATH = '/api/xpanel';
  ATOKEN = sessionStorage.getItem('atoken');
  if (ATOKEN) showPanel();
});

async function doLogin() {
  const user = document.getElementById('adminUser').value.trim();
  const pass = document.getElementById('adminPass').value;
  const btn  = document.getElementById('loginBtn');
  const err  = document.getElementById('loginErr');
  err.style.display = 'none';

  if (!user || !pass) { err.textContent='Fill all fields'; err.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Verifying...';

  try {
    const r = await fetch(`${APATH}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const d = await r.json();
    if (d.success) {
      ATOKEN = d.token;
      sessionStorage.setItem('atoken', ATOKEN);
      showPanel();
    } else {
      err.textContent = d.message || 'Login failed';
      err.style.display = 'block';
    }
  } catch {
    err.textContent = 'Connection error';
    err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Access Panel';
}

function showPanel() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  loadDashboard();
}

function adminLogout() {
  sessionStorage.removeItem('atoken');
  ATOKEN = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('panel').style.display = 'none';
}

async function api(path, opts = {}) {
  const r = await fetch(`${APATH}${path}`, {
    ...opts,
    headers: { 'Content-Type':'application/json', Authorization:`Bearer ${ATOKEN}`, ...(opts.headers||{}) }
  });
  if (r.status === 401) { adminLogout(); return null; }
  return r.json();
}

// ── TABS ──
function switchTab(tab, el) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  const fns = { dashboard:loadDashboard, users:loadUsers, bets:loadBets, matches:loadMatches, transactions:loadTransactions, settlement:loadSettlement };
  fns[tab]?.();
}

function setContent(html) { document.getElementById('content').innerHTML = html; }

// ── DASHBOARD ──
async function loadDashboard() {
  setContent('<div class="spin"></div>');
  const d = await api('/dashboard');
  if (!d?.success) return setContent('<p style="color:var(--rd);text-align:center;padding:30px">Failed to load</p>');

  const { users, bets, finance, recentBets, recentUsers } = d.data;
  setContent(`
    <div class="stat-grid">
      <div class="scard"><div class="scard-val">${users.total}</div><div class="scard-lbl">Total Users</div></div>
      <div class="scard"><div class="scard-val">${users.active}</div><div class="scard-lbl">Active Users</div></div>
      <div class="scard"><div class="scard-val">${bets.total}</div><div class="scard-lbl">Total Bets</div></div>
      <div class="scard"><div class="scard-val" style="color:var(--yl)">${bets.pending}</div><div class="scard-lbl">Pending Bets</div></div>
    </div>
    <div class="finance-row">
      <div class="fcard"><div class="fcard-val" style="color:var(--g)">KES ${finance.deposits}</div><div class="fcard-lbl">Total Deposits</div></div>
      <div class="fcard"><div class="fcard-val" style="color:var(--rd)">KES ${finance.payouts}</div><div class="fcard-lbl">Total Payouts</div></div>
      <div class="fcard"><div class="fcard-val" style="color:var(--yl)">KES ${finance.revenue}</div><div class="fcard-lbl">Revenue</div></div>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-head"><span class="tbl-title">Recent Bets</span></div>
      <table><thead><tr><th>Code</th><th>User</th><th>Stake</th><th>Odds</th><th>Status</th></tr></thead>
      <tbody>${recentBets.map(b=>`<tr>
        <td style="font-family:monospace;font-size:12px">${b.betCode}</td>
        <td>${b.userId?.username||'—'}</td>
        <td>KES ${b.stake}</td>
        <td style="color:var(--yl)">${b.totalOdds}</td>
        <td><span class="badge b-${b.status}">${b.status}</span></td>
      </tr>`).join('')}</tbody></table>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-head"><span class="tbl-title">Recent Users</span></div>
      <table><thead><tr><th>Username</th><th>Phone</th><th>Balance</th><th>Joined</th></tr></thead>
      <tbody>${recentUsers.map(u=>`<tr>
        <td>${u.username}</td>
        <td>${u.phone}</td>
        <td style="color:var(--g)">KES ${parseFloat(u.balance||0).toFixed(2)}</td>
        <td style="color:var(--mt);font-size:12px">${new Date(u.createdAt).toLocaleDateString()}</td>
      </tr>`).join('')}</tbody></table>
    </div>`);
}

// ── USERS ──
async function loadUsers(page=1, search='') {
  setContent('<div class="spin"></div>');
  const d = await api(`/users?page=${page}&limit=25${search?'&search='+search:''}`);
  if (!d?.success) return;

  setContent(`
    <div class="tbl-wrap">
      <div class="tbl-head">
        <span class="tbl-title">Users (${d.total})</span>
        <input class="tbl-search" placeholder="Search phone/username" oninput="loadUsers(1,this.value)" value="${search}"/>
      </div>
      <table><thead><tr><th>Username</th><th>Phone</th><th>Balance</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody>${d.data.map(u=>`<tr>
        <td>${u.username}</td>
        <td style="font-size:12px;color:var(--mt)">${u.phone}</td>
        <td style="color:var(--g)">KES ${parseFloat(u.balance||0).toFixed(2)}</td>
        <td><span class="badge ${u.isActive?'b-active':'b-suspended'}">${u.isActive?'Active':'Suspended'}</span></td>
        <td style="color:var(--mt);font-size:11px">${new Date(u.createdAt).toLocaleDateString()}</td>
        <td style="display:flex;gap:5px;flex-wrap:wrap">
          <button class="abtn blue" onclick="openBalance('${u._id}','${u.username}')">Balance</button>
          <button class="abtn ${u.isActive?'red':'green'}" onclick="toggleSuspend('${u._id}',this)">${u.isActive?'Suspend':'Activate'}</button>
        </td>
      </tr>`).join('')}</tbody></table>
    </div>
    <div class="pagination">
      <button class="pager" ${page<=1?'disabled':''} onclick="loadUsers(${page-1},'${search}')">← Prev</button>
      <span style="color:var(--mt);font-size:13px">Page ${page} of ${d.pages}</span>
      <button class="pager" ${page>=d.pages?'disabled':''} onclick="loadUsers(${page+1},'${search}')">Next →</button>
    </div>`);
}

// ── BETS ──
async function loadBets(page=1, status='') {
  setContent('<div class="spin"></div>');
  const d = await api(`/bets?page=${page}&limit=25${status?'&status='+status:''}`);
  if (!d?.success) return;

  setContent(`
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      ${['','pending','won','lost','void'].map(s=>`
        <button class="abtn ${s===status?'green':'blue'}" onclick="loadBets(1,'${s}')">${s||'All'}</button>`).join('')}
    </div>
    <div class="tbl-wrap">
      <div class="tbl-head"><span class="tbl-title">Bets (${d.total})</span></div>
      <table><thead><tr><th>Code</th><th>User</th><th>Sels</th><th>Stake</th><th>Odds</th><th>Pot.Win</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${d.data.map(b=>`<tr>
        <td style="font-family:monospace;font-size:12px">${b.betCode}</td>
        <td>${b.userId?.username||'—'}</td>
        <td style="color:var(--mt)">${b.selections?.length||0}</td>
        <td>KES ${b.stake}</td>
        <td style="color:var(--yl)">${b.totalOdds}</td>
        <td style="color:var(--g)">KES ${parseFloat(b.potentialWin||0).toFixed(2)}</td>
        <td><span class="badge b-${b.status}">${b.status}</span></td>
        <td>${b.status==='pending'?`<button class="abtn red" onclick="openVoid('${b.betCode}')">Void</button>`:''}</td>
      </tr>`).join('')}</tbody></table>
    </div>
    <div class="pagination">
      <button class="pager" ${page<=1?'disabled':''} onclick="loadBets(${page-1},'${status}')">← Prev</button>
      <span style="color:var(--mt);font-size:13px">Page ${page} of ${d.pages}</span>
      <button class="pager" ${page>=d.pages?'disabled':''} onclick="loadBets(${page+1},'${status}')">Next →</button>
    </div>`);
}

// ── MATCHES ──
async function loadMatches() {
  setContent('<div class="spin"></div>');
  const d = await api('/matches?status=upcoming');
  if (!d?.success) return;

  setContent(`
    <div class="tbl-wrap">
      <div class="tbl-head"><span class="tbl-title">Upcoming Matches (${d.data.length})</span></div>
      <table><thead><tr><th>Match</th><th>League</th><th>Date</th><th>Status</th><th>Bets</th><th>Actions</th></tr></thead>
      <tbody>${d.data.map(m=>`<tr>
        <td style="font-size:13px;font-weight:600">${m.homeTeam} vs ${m.awayTeam}</td>
        <td style="color:var(--mt);font-size:12px">${m.league}</td>
        <td style="color:var(--mt);font-size:11px">${new Date(m.commenceTime).toLocaleString()}</td>
        <td><span class="badge b-${m.status==='upcoming'?'pending':m.status==='finished'?'won':'pending'}">${m.status}</span></td>
        <td>${m.betsCount||0}</td>
        <td><button class="abtn green" onclick="openResult('${m._id}','${esc(m.homeTeam+' vs '+m.awayTeam)}')">Set Result</button></td>
      </tr>`).join('')}</tbody></table>
    </div>`);
}

// ── TRANSACTIONS ──
async function loadTransactions(page=1, type='') {
  setContent('<div class="spin"></div>');
  const d = await api(`/transactions?page=${page}&limit=30${type?'&type='+type:''}`);
  if (!d?.success) return;

  setContent(`
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      ${['','deposit','win','bet','refund'].map(t=>`
        <button class="abtn ${t===type?'green':'blue'}" onclick="loadTransactions(1,'${t}')">${t||'All'}</button>`).join('')}
    </div>
    <div class="tbl-wrap">
      <div class="tbl-head"><span class="tbl-title">Transactions (${d.total})</span></div>
      <table><thead><tr><th>User</th><th>Type</th><th>Amount</th><th>Balance</th><th>Reference</th><th>Date</th></tr></thead>
      <tbody>${d.data.map(t=>`<tr>
        <td>${t.userId?.username||'—'}</td>
        <td><span class="badge ${['deposit','win','bonus','refund'].includes(t.type)?'b-won':'b-lost'}">${t.type}</span></td>
        <td style="color:${t.amount>0?'var(--g)':'var(--rd)'};">${t.amount>0?'+':''}KES ${Math.abs(t.amount).toFixed(2)}</td>
        <td style="color:var(--mt)">KES ${parseFloat(t.balance||0).toFixed(2)}</td>
        <td style="font-size:11px;color:var(--mt);font-family:monospace">${t.reference||'—'}</td>
        <td style="font-size:11px;color:var(--mt)">${new Date(t.createdAt).toLocaleString()}</td>
      </tr>`).join('')}</tbody></table>
    </div>
    <div class="pagination">
      <button class="pager" ${page<=1?'disabled':''} onclick="loadTransactions(${page-1},'${type}')">← Prev</button>
      <span style="color:var(--mt);font-size:13px">Page ${page} of ${d.pages}</span>
      <button class="pager" ${page>=d.pages?'disabled':''} onclick="loadTransactions(${page+1},'${type}')">Next →</button>
    </div>`);
}

// ── SETTLEMENT ──
function loadSettlement() {
  setContent(`
    <div class="tbl-wrap" style="padding:20px">
      <div class="tbl-title" style="margin-bottom:12px">Manual Settlement</div>
      <p style="color:var(--mt);font-size:13px;margin-bottom:16px">
        The settlement engine runs automatically every 5 minutes.<br/>
        Use this to trigger it manually if needed.
      </p>
      <button class="abtn green" style="padding:12px 24px;font-size:14px" onclick="runSettle()">
        ▶ Run Settlement Now
      </button>
      <div id="settleResult" style="margin-top:14px;font-size:13px;color:var(--mt)"></div>
    </div>
    <div class="tbl-wrap" style="padding:20px;margin-top:10px">
      <div class="tbl-title" style="margin-bottom:12px">Set Match Result Manually</div>
      <p style="color:var(--mt);font-size:13px">Go to the Matches tab and click "Set Result" on any match to manually grade bets.</p>
    </div>`);
}

async function runSettle() {
  document.getElementById('settleResult').textContent = 'Running...';
  const d = await api('/settlement/run', { method:'POST' });
  if (d?.success) {
    document.getElementById('settleResult').innerHTML =
      `<span style="color:var(--g)">✅ Done — ${d.result.settled} bets settled, ${d.result.paid} paid out</span>`;
  } else {
    document.getElementById('settleResult').innerHTML = `<span style="color:var(--rd)">Failed: ${d?.message}</span>`;
  }
}

// ── ACTIONS ──
function openBalance(id, username) {
  selUser = id;
  document.getElementById('balUser').value = username;
  document.getElementById('balAmount').value = '';
  document.getElementById('balReason').value = '';
  openModal('balanceModal');
}

async function submitBalance() {
  const amount = parseFloat(document.getElementById('balAmount').value);
  const reason = document.getElementById('balReason').value.trim();
  if (!amount || !reason) return showT('Fill all fields','err');
  const d = await api(`/users/${selUser}/balance`, { method:'PUT', body: JSON.stringify({amount,reason}) });
  if (d?.success) { showT(d.message,'ok'); closeModal('balanceModal'); loadUsers(); }
  else showT(d?.message||'Failed','err');
}

function openVoid(betCode) {
  selBet = betCode;
  document.getElementById('voidCode').value = betCode;
  document.getElementById('voidReason').value = '';
  openModal('voidModal');
}

async function submitVoid() {
  const reason = document.getElementById('voidReason').value.trim();
  if (!reason) return showT('Enter a reason','err');
  const d = await api(`/bets/${selBet}/void`, { method:'POST', body:JSON.stringify({reason}) });
  if (d?.success) { showT('Bet voided — stake refunded','ok'); closeModal('voidModal'); loadBets(); }
  else showT(d?.message||'Failed','err');
}

function openResult(id, matchName) {
  selMatch = id;
  document.getElementById('resultMatch').value = matchName;
  document.getElementById('resHomeScore').value = '';
  document.getElementById('resAwayScore').value = '';
  openModal('resultModal');
}

async function submitResult() {
  const result    = document.getElementById('resultPick').value;
  const homeScore = parseInt(document.getElementById('resHomeScore').value) || 0;
  const awayScore = parseInt(document.getElementById('resAwayScore').value) || 0;
  const d = await api(`/matches/${selMatch}/result`, { method:'PUT', body:JSON.stringify({result,homeScore,awayScore}) });
  if (d?.success) { showT(`Result set — ${d.settleResult.settled} bets settled`,'ok'); closeModal('resultModal'); loadMatches(); }
  else showT(d?.message||'Failed','err');
}

async function toggleSuspend(id, btn) {
  const d = await api(`/users/${id}/suspend`, { method:'PUT' });
  if (d?.success) {
    showT(d.message,'ok');
    btn.textContent = d.isActive ? 'Suspend' : 'Activate';
    btn.className = `abtn ${d.isActive?'red':'green'}`;
  } else showT(d?.message||'Failed','err');
}

function openModal(id)  { document.getElementById(id).classList.add('on'); }
function closeModal(id) { document.getElementById(id).classList.remove('on'); }
function esc(s){ return String(s).replace(/'/g,"\\'"); }

let tTmr=null;
function showT(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast on ${type}`;
  clearTimeout(tTmr); tTmr=setTimeout(()=>el.classList.remove('on'),4000);
}
</script>
</body>
</html>
