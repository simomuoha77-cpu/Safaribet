<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Casino – SafariBet</title>
<script src="/js/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--g:#00c853;--bg:#0a0e0a;--s1:#111711;--s2:#182018;--s3:#1e271e;--bd:rgba(0,200,83,0.1);--tx:#e8f5e9;--mt:#6a8a6a;--yl:#ffd600;--rd:#ff3b3b;--hh:52px;--bn:56px;--hdr:rgba(8,12,8,0.98)}
html[data-theme="light"]{--g:#00a844;--bg:#f4f7f4;--s1:#fff;--s2:#eef3ee;--s3:#e4ece4;--bd:rgba(0,140,58,0.18);--tx:#14231a;--mt:#5c7a63;--hdr:rgba(255,255,255,0.98)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);overscroll-behavior:none}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--hh);background:var(--hdr);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;backdrop-filter:blur(20px)}
.back{font-size:20px;color:var(--g);text-decoration:none;font-weight:700}
.logo{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--g)}
.logo span{color:var(--yl)}
.bal{margin-left:auto;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:5px 12px;font-size:13px;font-weight:800;color:var(--g)}

/* LOBBY */
.main{margin-top:var(--hh);padding:0 0 calc(var(--bn)+20px)}
.lobby-hero{background:linear-gradient(135deg,#003d1a 0%,#001208 60%,#050a05 100%);padding:20px 16px;position:relative;overflow:hidden;border-bottom:1px solid var(--bd)}
.lobby-hero::before{content:'🎰';position:absolute;right:-10px;top:-10px;font-size:100px;opacity:0.08}
.lobby-ttl{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px}
.lobby-sub{font-size:12px;color:var(--mt)}

/* GAME GRID */
.section-ttl{font-size:12px;font-weight:800;color:var(--mt);text-transform:uppercase;letter-spacing:0.8px;padding:16px 14px 8px}
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 10px 10px}
.game-card{background:var(--s2);border:1px solid var(--bd);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform 0.15s,border-color 0.15s;position:relative}
.game-card:active{transform:scale(0.97)}
.game-card.featured{grid-column:1/-1}
.game-card:hover{border-color:rgba(0,200,83,0.3)}
.gc-banner{height:100px;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative}
.game-card.featured .gc-banner{height:120px;font-size:64px}
.gc-banner-bg{position:absolute;inset:0}
.gc-body{padding:10px 12px 12px}
.gc-name{font-size:14px;font-weight:800;margin-bottom:2px}
.gc-desc{font-size:11px;color:var(--mt);margin-bottom:8px;line-height:1.4}
.gc-badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:0.3px}
.badge-pf{background:rgba(0,200,83,0.1);color:var(--g);border:1px solid rgba(0,200,83,0.2)}
.badge-hot{background:rgba(255,59,59,0.1);color:var(--rd);border:1px solid rgba(255,59,59,0.2)}
.badge-new{background:rgba(255,214,0,0.1);color:var(--yl);border:1px solid rgba(255,214,0,0.2)}
.badge-mx{background:rgba(100,100,255,0.1);color:#a0a0ff;border:1px solid rgba(100,100,255,0.2)}
.gc-rtp{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.55);border-radius:6px;padding:3px 7px;font-size:10px;font-weight:700;color:#fff;backdrop-filter:blur(4px)}

/* GAME SCREEN (fullscreen overlay) */
.game-screen{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
.game-screen.on{display:flex}
.gs-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--hdr);border-bottom:1px solid var(--bd);flex-shrink:0}
.gs-back{font-size:22px;cursor:pointer;color:var(--g)}
.gs-title{font-size:16px;font-weight:800;flex:1}
.gs-bal{font-size:13px;font-weight:800;color:var(--g);background:var(--s2);padding:4px 10px;border-radius:8px;border:1px solid var(--bd)}
.gs-body{flex:1;overflow-y:auto;padding:16px}

/* GAME UI COMPONENTS */
.game-box{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:14px}
.game-box-ttl{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.result-display{min-height:80px;background:var(--s3);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:32px;font-weight:900;position:relative;overflow:hidden}
.stake-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.stake-row input{flex:1;background:var(--s3);border:1px solid var(--bd);border-radius:10px;padding:12px;font-size:15px;font-weight:700;color:var(--tx);outline:none;font-family:'Inter',sans-serif}
.quick-stakes{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.qs{padding:5px 10px;background:var(--s3);border:1px solid var(--bd);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--mt)}
.qs:hover{color:var(--g);border-color:var(--g)}
.play-btn{width:100%;padding:15px;background:linear-gradient(135deg,#00e65c,#00c853);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;transition:all 0.2s}
.play-btn:disabled{background:var(--s3);color:var(--mt);cursor:not-allowed}
.play-btn:not(:disabled):active{transform:scale(0.98)}
.result-msg{text-align:center;padding:10px;border-radius:10px;font-size:15px;font-weight:800;margin-top:10px;display:none}
.result-msg.win{background:rgba(0,200,83,0.1);border:1px solid rgba(0,200,83,0.3);color:var(--g);display:block}
.result-msg.lose{background:rgba(255,59,59,0.08);border:1px solid rgba(255,59,59,0.2);color:var(--rd);display:block}
.multiplier-row{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid var(--bd)}
.multiplier-row:last-child{border:none}
.err-msg{display:none;background:rgba(255,59,59,0.08);border:1px solid rgba(255,59,59,0.2);color:var(--rd);font-size:12px;font-weight:600;border-radius:8px;padding:10px 12px;margin-bottom:10px;text-align:center}

/* DICE SPECIFIC */
.dice-num{font-size:56px;font-weight:900;color:var(--g);font-family:'Rajdhani',sans-serif}
.dice-slider{width:100%;margin:8px 0;accent-color:var(--g)}
.dir-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.dir-btn{padding:12px;border-radius:10px;border:2px solid var(--bd);background:var(--s3);font-size:13px;font-weight:700;cursor:pointer;color:var(--mt);transition:all 0.2s;text-align:center}
.dir-btn.on{border-color:var(--g);color:var(--g);background:rgba(0,200,83,0.08)}

/* SLOTS SPECIFIC */
.reels{display:flex;gap:10px;justify-content:center;margin:12px 0}
.reel{width:76px;height:76px;background:var(--s3);border:2px solid var(--bd);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:36px;transition:all 0.3s}
.reel.spin{animation:spinReel 0.4s ease-in-out}
@keyframes spinReel{0%{transform:translateY(-10px);opacity:0}100%{transform:translateY(0);opacity:1}}

/* PLINKO SPECIFIC */
.plinko-board{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin:8px 0;padding:8px;background:var(--s3);border-radius:12px}
.plinko-peg{width:100%;aspect-ratio:1;background:var(--mt);border-radius:50%;opacity:0.4}
.plinko-bucket{padding:4px;text-align:center;font-size:9px;font-weight:800;border-radius:6px}

/* WHEEL SPECIFIC */
.wheel-wrap{position:relative;width:200px;height:200px;margin:0 auto 12px}
.wheel-canvas{width:200px;height:200px;border-radius:50%;border:3px solid var(--bd)}
.wheel-pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:20px}
.color-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.color-btn{padding:12px 8px;border-radius:10px;border:2px solid transparent;font-size:12px;font-weight:800;cursor:pointer;text-align:center;transition:all 0.2s}
.color-btn.on{transform:scale(1.04);box-shadow:0 0 12px currentColor}

/* HI-LO SPECIFIC */
.card-display{font-size:64px;text-align:center;padding:16px;background:var(--s3);border-radius:14px;margin-bottom:10px}
.hilo-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.hilo-btn{padding:14px 8px;border-radius:10px;border:2px solid var(--bd);background:var(--s3);font-size:12px;font-weight:800;cursor:pointer;color:var(--mt);text-align:center;transition:all 0.2s}
.hilo-btn.on{border-color:var(--g);color:var(--g);background:rgba(0,200,83,0.08)}

/* MINES SPECIFIC */
.mines-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:10px 0}
.mine-cell{aspect-ratio:1;background:var(--s3);border:1.5px solid var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all 0.15s}
.mine-cell:hover:not(.revealed){background:var(--s2);border-color:var(--g)}
.mine-cell.safe{background:rgba(0,200,83,0.08);border-color:var(--g)}
.mine-cell.bomb{background:rgba(255,59,59,0.1);border-color:var(--rd)}

/* COLOR GAME SPECIFIC */
.color-predict-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.cp-btn{padding:18px 8px;border-radius:12px;border:2px solid transparent;font-size:13px;font-weight:800;cursor:pointer;text-align:center;transition:all 0.2s}
.cp-btn.on{transform:scale(1.05)}

/* HISTORY */
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--bd);font-size:12px}
.hist-item:last-child{border:none}
.hist-win{color:var(--g);font-weight:700}
.hist-loss{color:var(--rd);font-weight:700}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:199;background:var(--hdr);border-top:1px solid var(--bd);display:flex;height:var(--bn);backdrop-filter:blur(20px)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--mt);cursor:pointer;gap:2px;text-transform:uppercase}
.bni.on{color:var(--g)}
.bni svg{width:22px;height:22px;fill:currentColor}
</style>
</head>
<body>

<header>
  <a class="back" href="/">←</a>
  <div class="logo">Safari<span>Bet</span> Casino</div>
  <div class="bal" id="headerBal">KES —</div>
</header>

<main class="main" id="lobbyMain">

  <div class="lobby-hero">
    <div class="lobby-ttl">🎰 Casino Games</div>
    <div class="lobby-sub">Real games · Instant payouts · Provably fair</div>
  </div>

  <!-- LOADING STATE -->
  <div id="gamesLoading" style="text-align:center;padding:60px 20px;color:var(--mt)">
    <div style="font-size:40px;margin-bottom:12px">🎰</div>
    <div style="font-size:14px">Loading games...</div>
  </div>

  <!-- GAME GRID — populated by JS -->
  <div id="gamesError" style="display:none;text-align:center;padding:40px 20px">
    <div style="font-size:36px;margin-bottom:12px">⚠️</div>
    <div style="font-size:14px;font-weight:700;margin-bottom:6px">Could not load games</div>
    <div style="font-size:12px;color:var(--mt);margin-bottom:16px" id="gamesErrMsg"></div>
    <button onclick="loadGames()" style="padding:10px 24px;background:var(--g);color:#000;border:none;border-radius:10px;font-weight:700;cursor:pointer">Retry</button>
  </div>

  <div style="display:none" id="gamesList">
    <div class="section-ttl" id="gamesCountLbl">Games</div>
    <div class="game-grid" id="gameGrid"></div>
    <div style="padding:20px 14px;font-size:11px;color:var(--mt);text-align:center">
      More games coming soon
    </div>
  </div>

</main>

<!-- GAME IFRAME SCREEN -->
<div id="gameScreen" style="position:fixed;inset:0;z-index:300;background:var(--bg);display:none;flex-direction:column">
  <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--hdr);border-bottom:1px solid var(--bd);flex-shrink:0;height:52px">
    <span onclick="closeGameScreen()" style="font-size:22px;cursor:pointer;color:var(--g)">←</span>
    <span id="gameScreenTitle" style="font-size:16px;font-weight:800;flex:1"></span>
    <span id="gameScreenBal" style="font-size:13px;font-weight:800;color:var(--g);background:var(--s2);padding:4px 10px;border-radius:8px;border:1px solid var(--bd)">KES —</span>
  </div>
  <iframe id="gameIframe" style="flex:1;border:none;width:100%;background:#000" allowfullscreen></iframe>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <div class="bni" onclick="location.href='/'">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
  </div>
  <div class="bni" onclick="location.href='/my-bets'">
    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>My Bets
  </div>
  <div class="bni on">
    <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 3a4 4 0 110 8 4 4 0 010-8zm0 10c-2.67 0-8 1.34-8 4v1h16v-1c0-2.66-5.33-4-8-4z"/></svg>Casino
  </div>
  <div class="bni" onclick="location.href='/account'">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Account
  </div>
</nav>

<script>
const token = localStorage.getItem('token');
if (!token) location.href = '/login';

const JUAN_BASE = ''; // proxied through our server — see /api/casino/*

const CAT_ICONS = {
  crash:   '✈️',
  slots:   '🎰',
  table:   '🃏',
  instant: '⚡',
  dice:    '🎲',
  plinko:  '🪃',
  mines:   '💣',
  wheel:   '🎡',
  color:   '🎨',
  default: '🎮'
};

const CAT_GRADIENTS = {
  crash:   'linear-gradient(135deg,#1a0505,#300a0a)',
  slots:   'linear-gradient(135deg,#1a0a00,#0a0500)',
  table:   'linear-gradient(135deg,#001a0a,#00050a)',
  instant: 'linear-gradient(135deg,#1a1a00,#0a0a00)',
  dice:    'linear-gradient(135deg,#0a1a0a,#051205)',
  plinko:  'linear-gradient(135deg,#00051a,#001a1a)',
  mines:   'linear-gradient(135deg,#1a1a00,#0a0a00)',
  default: 'linear-gradient(135deg,#0a0a1a,#050510)'
};

async function loadBalance() {
  try {
    const r = await fetch('/api/wallet/balance', {
      headers: { Authorization: 'Bearer ' + token }
    });
    const d = await r.json();
    if (d.success) {
      const bal = (d.spendable ?? d.balance ?? 0).toFixed(2);
      document.getElementById('headerBal').textContent = 'KES ' + bal;
      document.getElementById('gameScreenBal').textContent = 'KES ' + bal;
    }
  } catch(e) {}
}

async function loadGames() {
  document.getElementById('gamesLoading').style.display = 'block';
  document.getElementById('gamesError').style.display = 'none';
  document.getElementById('gamesList').style.display = 'none';

  try {
    const r = await fetch('/api/casino/juan-games');
    const d = await r.json();

    document.getElementById('gamesLoading').style.display = 'none';

    if (!d.success || !d.data?.length) {
      document.getElementById('gamesError').style.display = 'block';
      document.getElementById('gamesErrMsg').textContent = d.message || 'No games available right now';
      return;
    }

    const games = d.data;
    document.getElementById('gamesCountLbl').textContent = `🎮 ${games.length} Game${games.length>1?'s':''} Available`;
    
    const grid = document.getElementById('gameGrid');
    grid.innerHTML = games.map(g => {
      const icon = CAT_ICONS[g.category] || CAT_ICONS.default;
      const bg   = CAT_GRADIENTS[g.category] || CAT_GRADIENTS.default;
      const isAviator = (g.id === 'aviator' || /aviator/i.test(g.name));
      const thumb = isAviator
        ? `<img src="/api/content/image/aviator" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`
        : (g.thumbnail
            ? `<img src="${g.thumbnailFull||g.thumbnail}" style="width:100%;height:100%;object-fit:cover;opacity:0.8" onerror="this.style.display='none'">`
            : '');
      return `<div class="game-card${g.category==='crash'?' featured':''}" onclick="openGame('${g.id}','${g.name}')">
        <div class="gc-banner" style="background:${bg}">
          ${thumb}
          <div style="position:relative;z-index:1;font-size:${g.category==='crash'?'64':'52'}px">${isAviator ? '' : icon}</div>
        </div>
        <div class="gc-rtp">RTP ${g.rtp}%</div>
        <div class="gc-body">
          <div class="gc-name">${g.name}</div>
          <div class="gc-desc">${getCatDesc(g.category)}</div>
          <div class="gc-badges">
            <span class="badge badge-pf">Verified</span>
            ${g.category==='crash'?'<span class="badge badge-hot">🔥 HOT</span>':''}
            ${g.status==='active'?'<span class="badge" style="background:rgba(0,200,83,0.08);color:var(--g);border:1px solid rgba(0,200,83,0.2)">● Live</span>':'<span class="badge" style="color:var(--mt)">Maintenance</span>'}
          </div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('gamesList').style.display = 'block';
  } catch(e) {
    document.getElementById('gamesLoading').style.display = 'none';
    document.getElementById('gamesError').style.display = 'block';
    document.getElementById('gamesErrMsg').textContent = 'Network error — check connection';
  }
}

function getCatDesc(cat) {
  const descs = {
    crash:   'Bet and cash out before it crashes!',
    slots:   'Spin the reels and match symbols to win.',
    table:   'Classic casino table game.',
    instant: 'Fast-paced instant win game.',
    dice:    'Roll over or under to win.',
    plinko:  'Drop the ball into multiplier buckets.',
    mines:   'Reveal safe cells, avoid the mines!',
    wheel:   'Spin to win up to 18x your stake.',
    color:   'Predict the color, win instantly.'
  };
  return descs[cat] || 'Play and win real money!';
}

function openGame(id, name) {
  // Set JWT as a short-lived cookie so the server can read it
  // on the GET /api/casino/play/:gameId request
  document.cookie = `sb_token=${token}; path=/; max-age=120; SameSite=Lax`;
  location.href = `/casino/play/${id}`;
}

function closeGameScreen() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('gameIframe').src = '';
  loadBalance(); // refresh balance after playing
}

loadBalance();
loadGames();

// Refresh balance every 30s while on casino page
setInterval(loadBalance, 30000);
</script>
</body>
