<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Aviator – BetaKE</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'Rajdhani',sans-serif;color:#fff}
body{display:flex;flex-direction:column;height:100dvh;height:100vh}

/* ── TOPBAR — exactly like Spribe: logo center, back left, balance right ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  height:44px;padding:0 12px;
  background:#1a1a1a;border-bottom:1px solid #222;flex-shrink:0;
}
.tbback{font-size:12px;color:#666;background:none;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;cursor:pointer;min-width:60px}
/* Spribe logo: red italic serif "✈ Aviator" */
.tblogo{
  font-family:Georgia,'Times New Roman',serif;
  font-style:italic;font-weight:900;font-size:21px;
  color:#e8001e;letter-spacing:-0.5px;
  display:flex;align-items:center;gap:5px;
}
.tblogo svg{width:18px;height:18px;fill:#e8001e}
.tbbal{font-size:13px;font-weight:700;color:#ccc;min-width:60px;text-align:right}
.tbbal span{color:#aaa;font-size:10px}

/* ── HISTORY BAR — plain colored numbers, no pill background ── */
.hbar{
  display:flex;align-items:center;gap:9px;
  padding:0 10px;height:28px;
  background:#1a1a1a;border-bottom:1px solid #222;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.hbar::-webkit-scrollbar{display:none}
/* Spribe history: plain colored text — cyan/blue for low, purple for high */
.hc{font-size:11px;font-weight:700;flex-shrink:0;cursor:pointer;font-family:'Rajdhani',sans-serif}
.hc.r{color:#e8001e}
.hc.c{color:#00c8ff}  /* cyan — Spribe's main color for 1-2x */
.hc.y{color:#ffb300}
.hc.p{color:#d070ff}
.hmore{background:none;border:none;color:#444;cursor:pointer;font-size:14px;flex-shrink:0}

/* ── GAME CANVAS — tall, fills available space ── */
.gwrap{
  position:relative;
  width:100%;
  /* Takes remaining space minus bet panel height (~230px) */
  flex:0 0 auto;
  height:calc(100dvh - 42px - 28px - 225px);
  min-height:220px;max-height:460px;
  background:#0f0f12;overflow:hidden;
}
#gc{position:absolute;inset:0;width:100%;height:100%;display:block}

/* ── MULTIPLIER — large white bold center ── */
.mwrap{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:3;pointer-events:none;width:100%}
/* Spribe font: very bold, slightly condensed */
.mval{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(54px,15vw,90px);line-height:1;color:#fff;letter-spacing:-1px}
.mval.crash{color:#e8001e}
.mval.wait{display:none}

/* ── WAIT OVERLAY ── */
.wovl{position:absolute;inset:0;background:rgba(8,8,12,.9);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:5}
.wovl.on{display:flex}
.wlbl{font-size:11px;color:#444;letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:10px}
.wnum{font-family:'Orbitron',monospace;font-size:clamp(68px,18vw,92px);font-weight:900;color:#ffd600;line-height:1;text-shadow:0 0 30px rgba(255,214,0,.5);transition:transform .1s}
.wnum.t{transform:scale(1.18)}

/* ── PLAYER COUNT — bottom right ── */
.pcount{position:absolute;bottom:7px;right:8px;display:flex;align-items:center;gap:5px;z-index:3;font-size:11px;color:#555}
.pavs{display:flex}
.pav{width:18px;height:18px;border-radius:50%;overflow:hidden;margin-left:-6px;border:1.5px solid #222;background:#1a2535}
.pav:first-child{margin-left:0}
.pav img{width:100%;height:100%;object-fit:cover}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;scrollbar-width:none;background:#111;min-height:0}
.scroll::-webkit-scrollbar{display:none}

/* ── BET PANEL ── */
.bpanel{background:#1a1a1a;padding:8px 0 0}

/* Spribe tab row: centered pill tabs "Bet / Auto" */
.trow{display:flex;justify-content:center;margin-bottom:7px;padding:0 12px}
.tabs{display:inline-flex;background:#111;border-radius:20px;padding:2px;gap:1px}
.tab{padding:4px 20px;border-radius:16px;border:none;font-size:12px;font-weight:700;font-family:'Rajdhani',sans-serif;text-transform:capitalize;color:#444;background:none;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.tab.on{background:#2a2a2a;color:#e5e5e5}

/* Input row: − [amount] + [BIG GREEN BUTTON] */
.irow{display:flex;align-items:center;gap:8px;padding:0 12px;margin-bottom:5px}
/* Spribe −/+ : small gray circles */
.pm{width:30px;height:30px;border-radius:50%;background:#252525;border:1px solid #2e2e2e;color:#aaa;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .1s;font-weight:300}
.pm:active{background:#333;transform:scale(.88)}
/* Amount: centered bold number */
.amt{flex:1;text-align:center;font-size:20px;font-weight:700;background:none;border:none;color:#fff;outline:none;font-family:'Rajdhani',sans-serif}
/* Spribe bet button: tall green rounded rectangle */
.bbtn{
  flex:0 0 140px;height:60px;border-radius:10px;border:none;
  font-size:17px;font-weight:800;cursor:pointer;font-family:'Rajdhani',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  line-height:1.15;transition:all .15s;letter-spacing:.2px;
}
.bbtn .bsub{font-size:14px;font-weight:800}
/* States */
.bbtn.bet{background:#2eb050;color:#fff;box-shadow:0 3px 14px rgba(46,176,80,.35)}
.bbtn.bet:active{transform:scale(.97)}
.bbtn.cash{background:linear-gradient(160deg,#d45500,#ff6a00);color:#fff;animation:cpulse .5s infinite alternate}
@keyframes cpulse{from{box-shadow:0 0 8px rgba(255,100,0,.4)}to{box-shadow:0 0 26px rgba(255,100,0,.9)}}
.bbtn.wait{background:#1e1e1e;border:1px solid #2a2a2a;color:#333}
.bbtn.placed{background:#152515;border:1px solid #2a4a2a;color:#2eb050}
.bbtn:disabled{opacity:.45;cursor:not-allowed;animation:none;box-shadow:none}

/* Quick amounts — Spribe: 4 equal gray boxes */
.qrow{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-bottom:0;padding:0}
.qs{background:#141414;border:none;border-top:1px solid #222;padding:6px 2px;font-size:12px;font-weight:700;color:#555;cursor:pointer;font-family:'Rajdhani',sans-serif;text-align:center;transition:background .1s}
.qs:active{background:#1e1e1e;color:#bbb}

/* Slot 2 separator */
.sep{height:1px;background:#222;margin:0}
.s2head{display:flex;align-items:center;gap:6px;padding:7px 12px 5px;justify-content:space-between}
.s2tabs{display:inline-flex;background:#111;border-radius:16px;padding:2px;gap:1px}
.s2tab{padding:3px 14px;border-radius:14px;border:none;font-size:11px;font-weight:700;font-family:'Rajdhani',sans-serif;color:#444;background:none;cursor:pointer;text-transform:capitalize;transition:all .12s}
.s2tab.on{background:#252525;color:#ddd}
.s2col{background:#252525;border:1px solid #2a2a2a;border-radius:5px;padding:2px 8px;font-size:13px;color:#444;cursor:pointer;border:none}

/* Auto panel */
.auto{display:none;flex-direction:column;gap:6px;padding:3px 12px 5px}
.auto.on{display:flex}
.arow{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#555;font-weight:700}
.ainp{background:#111;border:1px solid #252525;border-radius:5px;color:#ccc;font-size:13px;font-weight:700;font-family:'Rajdhani',sans-serif;text-align:center;padding:3px 6px;outline:none;width:75px}
.autobtn{height:52px;flex:0 0 140px;border-radius:10px;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:'Rajdhani',sans-serif;color:#888;background:#252525;border:1px solid #2e2e2e;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.2;transition:all .15s}
.autobtn.on{background:#2eb050;color:#fff;border-color:#2eb050}
.astat{font-size:10px;color:#2eb050;font-weight:700;min-height:13px;text-align:center;font-family:'Rajdhani',sans-serif}

/* ── BETS TABLE ── */
.btbl{background:#0d0d0d}
.btabs{display:flex;border-bottom:1px solid #1a1a1a}
.btab{flex:1;padding:8px;text-align:center;font-size:11px;font-weight:700;color:#333;cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.4px;transition:all .15s}
.btab.on{color:#ddd;border-bottom-color:#e8001e}
.bcnt{display:flex;align-items:center;gap:6px;padding:5px 12px;font-size:10px;color:#333;border-bottom:1px solid #111}
.bhdr{display:grid;grid-template-columns:1fr 60px 44px 60px;padding:4px 12px;font-size:9px;font-weight:700;color:#222;text-transform:uppercase;letter-spacing:.5px}
.blist{max-height:150px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#1a1a1a transparent}
.brow{display:grid;grid-template-columns:1fr 60px 44px 60px;padding:6px 12px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.025);align-items:center}
.brow .u{font-weight:700;color:#555}
.brow .x{color:#2eb050;font-weight:800;font-size:10px;font-family:'Orbitron',monospace}
.brow .w{color:#2eb050;font-weight:700}
.brow .d{color:#1e1e1e;font-style:italic}

/* ── TOAST ── */
.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;font-family:'Rajdhani',sans-serif;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.toast.tw{border-color:#2eb050;color:#2eb050}
.toast.tl{border-color:#e8001e;color:#e8001e}
.toast.ti{border-color:#ffd600;color:#ffd600}
@keyframes cflash{0%{background:rgba(232,0,30,.18)}100%{background:transparent}}
.cf{animation:cflash .35s ease-out forwards}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="tbback" onclick="history.back()">← Back</button>
  <div class="tblogo">
    <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
    Aviator
  </div>
  <div class="tbbal"><span id="bv">0.00</span> <span>KES</span></div>
</div>

<!-- HISTORY BAR -->
<div class="hbar" id="hbar">
  <span class="hc c">1.01x</span><span class="hc c">1.92x</span>
  <span class="hc r">1.00x</span><span class="hc c">1.20x</span>
  <span class="hc r">1.06x</span><span class="hc p">6.24x</span>
  <span class="hc c">1.91x</span><span class="hc y">1.98x</span>
  <button class="hmore">•••</button>
</div>

<!-- GAME CANVAS -->
<div class="gwrap" id="gw">
  <canvas id="gc"></canvas>
  <div class="mwrap">
    <div class="mval wait" id="mv">1.00x</div>
  </div>
  <div class="wovl" id="wo">
    <div class="wlbl">STARTING IN</div>
    <div class="wnum" id="wn">5</div>
  </div>
  <div class="pcount">
    <div class="pavs">
      <div class="pav"><div style="width:100%;height:100%;background:#1e3a5f;border-radius:50%"></div></div>
      <div class="pav"><div style="width:100%;height:100%;background:#1a2a3f;border-radius:50%"></div></div>
      <div class="pav"><div style="width:100%;height:100%;background:#162030;border-radius:50%"></div></div>
    </div>
    <span id="pc">0</span>
  </div>
</div>

<!-- SCROLL AREA -->
<div class="scroll">

  <!-- BET PANEL -->
  <div class="bpanel">

    <!-- SLOT 1 TABS -->
    <div class="trow">
      <div class="tabs">
        <button class="tab on" onclick="swTab(1,'bet',this)">Bet</button>
        <button class="tab" onclick="swTab(1,'auto',this)">Auto</button>
      </div>
    </div>

    <!-- Slot 1 Manual -->
    <div id="mp1">
      <div class="irow">
        <button class="pm" onclick="chg(1,-10)">−</button>
        <input class="amt" id="s1" type="number" value="10" min="10"/>
        <button class="pm" onclick="chg(1,10)">+</button>
        <button class="bbtn bet" id="b1" onclick="hbet(1)">
          Bet<br><span class="bsub" id="b1a">10.00 KES</span>
        </button>
      </div>
      <div class="qrow">
        <button class="qs" onclick="ss(1,100)">100</button>
        <button class="qs" onclick="ss(1,200)">200</button>
        <button class="qs" onclick="ss(1,500)">500</button>
        <button class="qs" onclick="ss(1,10000)">10,000</button>
      </div>
    </div>

    <!-- Slot 1 Auto -->
    <div id="ap1" class="auto">
      <div class="irow" style="margin-bottom:0">
        <button class="pm" onclick="chgA(1,-10)">−</button>
        <input class="amt" id="as1" type="number" value="10" min="10"/>
        <button class="pm" onclick="chgA(1,10)">+</button>
        <button class="autobtn" id="ab1" onclick="togAuto(1)">
          Auto Bet<br><span id="ab1s" style="font-size:10px">OFF</span>
        </button>
      </div>
      <div class="arow">
        <span>Auto Cash Out at ×</span>
        <input class="ainp" id="aco1" type="number" value="2.00" step="0.1" min="1.1"/>
      </div>
      <div class="astat" id="ast1"></div>
    </div>

    <!-- SLOT 2 -->
    <div class="sep"></div>
    <div class="s2head">
      <div class="s2tabs">
        <button class="s2tab on" onclick="swTab(2,'bet',this)">Bet</button>
        <button class="s2tab" onclick="swTab(2,'auto',this)">Auto</button>
      </div>
      <button class="s2col" onclick="togS2()" id="s2c">−</button>
    </div>
    <div id="s2body">
      <div id="mp2">
        <div class="irow">
          <button class="pm" onclick="chg(2,-10)">−</button>
          <input class="amt" id="s2" type="number" value="10" min="10"/>
          <button class="pm" onclick="chg(2,10)">+</button>
          <button class="bbtn bet" id="b2" onclick="hbet(2)">
            Bet<br><span class="bsub" id="b2a">10.00 KES</span>
          </button>
        </div>
        <div class="qrow">
          <button class="qs" onclick="ss(2,100)">100</button>
          <button class="qs" onclick="ss(2,200)">200</button>
          <button class="qs" onclick="ss(2,500)">500</button>
          <button class="qs" onclick="ss(2,10000)">10,000</button>
        </div>
      </div>
      <div id="ap2" class="auto">
        <div class="irow" style="margin-bottom:0">
          <button class="pm" onclick="chgA(2,-10)">−</button>
          <input class="amt" id="as2" type="number" value="10" min="10"/>
          <button class="pm" onclick="chgA(2,10)">+</button>
          <button class="autobtn" id="ab2" onclick="togAuto(2)">
            Auto Bet<br><span id="ab2s" style="font-size:10px">OFF</span>
          </button>
        </div>
        <div class="arow">
          <span>Auto Cash Out at ×</span>
          <input class="ainp" id="aco2" type="number" value="2.00" step="0.1" min="1.1"/>
        </div>
        <div class="astat" id="ast2"></div>
      </div>
    </div>

  </div><!-- /bpanel -->

  <!-- BETS TABLE -->
  <div class="btbl">
    <div class="btabs">
      <div class="btab on" onclick="setBT(this)">All Bets</div>
      <div class="btab" onclick="setBT(this)">Previous</div>
      <div class="btab" onclick="setBT(this)">Top</div>
    </div>
    <div class="bcnt">
      <div class="pavs" style="margin-right:4px">
        <div class="pav"><div style="background:#1e3a5f;width:100%;height:100%;border-radius:50%"></div></div>
        <div class="pav"><div style="background:#162030;width:100%;height:100%;border-radius:50%"></div></div>
      </div>
      <span id="bcnt" style="font-size:10px;color:#444">0/0 Bets</span>
      <span style="margin-left:auto;font-size:10px;color:#333">Total win KES <strong id="tw" style="color:#444">0.00</strong></span>
    </div>
    <div class="bhdr"><span>USER</span><span>BET KES</span><span>×</span><span>WIN KES</span></div>
    <div class="blist" id="bl"></div>
  </div>

</div><!-- /scroll -->

<div class="toast" id="tst"></div>

<script>
// ── STATE ──
let ST='waiting',HIST=[],PLAYERS=[];
let BET1=null,BET2=null,USER=null;
let lastRound=null,prevST='waiting',lastTickM=0;
let flyStart=null,localMulti=1,flightActive=false;
let pathPts=[],animFrame=null,waitTimer=null,countVal=5;
let s2collapsed=false;
let AUTO={1:{on:false},2:{on:false}};

// ── AUDIO ──
let AC=null,JET=null;
function gAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function startJet(instant){
  stopJet();const ac=gAC(),now=ac.currentTime,r=instant?.05:1;
  const out=ac.createGain();out.gain.value=.38;out.connect(ac.destination);const ns=[];
  const w=ac.createOscillator();w.type='sine';w.frequency.setValueAtTime(instant?900:600,now);w.frequency.linearRampToValueAtTime(1050,now+r*1.5);
  const g=ac.createGain();g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.14,now+r*.6);w.connect(g);g.connect(out);w.start(now);ns.push(w);
  const nb=ac.createBuffer(1,ac.sampleRate*4,ac.sampleRate);const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const n=ac.createBufferSource();n.buffer=nb;n.loop=true;
  const nf=ac.createBiquadFilter();nf.type='bandpass';nf.frequency.value=800;nf.Q.value=.8;
  const ng=ac.createGain();ng.gain.setValueAtTime(0,now);ng.gain.linearRampToValueAtTime(.11,now+r*.5);
  n.connect(nf);nf.connect(ng);ng.connect(out);n.start(now);ns.push(n);
  JET={nodes:ns,out};
}
function stopJet(){
  if(!JET)return;const ac=gAC(),now=ac.currentTime;
  JET.out.gain.setValueAtTime(JET.out.gain.value,now);JET.out.gain.linearRampToValueAtTime(0,now+.3);
  const j=JET;JET=null;setTimeout(()=>j.nodes.forEach(n=>{try{n.stop()}catch(e){}}),400);
}
function playCrash(){
  stopJet();const ac=gAC(),now=ac.currentTime;
  const out=ac.createGain();out.gain.value=.5;out.connect(ac.destination);
  const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(1050,now);o.frequency.exponentialRampToValueAtTime(60,now+.8);
  const g=ac.createGain();g.gain.setValueAtTime(.28,now);g.gain.exponentialRampToValueAtTime(.001,now+.9);
  o.connect(g);g.connect(out);o.start(now);o.stop(now+.9);
  document.getElementById('gw').classList.add('cf');
  setTimeout(()=>document.getElementById('gw').classList.remove('cf'),400);
}
function playCashout(){
  const ac=gAC(),now=ac.currentTime;const out=ac.createGain();out.gain.value=.42;out.connect(ac.destination);
  [523,659,784,1047].forEach((f,i)=>{const t=now+i*.08;const o=ac.createOscillator();o.type='sine';o.frequency.value=f;
    const g=ac.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.2,t+.03);g.gain.exponentialRampToValueAtTime(.001,t+.4);
    o.connect(g);g.connect(out);o.start(t);o.stop(t+.4);});
}
function playBet(){
  const ac=gAC(),now=ac.currentTime;const out=ac.createGain();out.gain.value=.4;out.connect(ac.destination);
  const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(280,now);o.frequency.exponentialRampToValueAtTime(160,now+.09);
  const g=ac.createGain();g.gain.setValueAtTime(.3,now);g.gain.exponentialRampToValueAtTime(.001,now+.12);
  o.connect(g);g.connect(out);o.start(now);o.stop(now+.12);
}
function playTick(){
  const ac=gAC(),now=ac.currentTime;const out=ac.createGain();out.gain.value=.22;out.connect(ac.destination);
  const o=ac.createOscillator();o.type='sine';o.frequency.value=Math.min(380+localMulti*55,1200);
  const g=ac.createGain();g.gain.setValueAtTime(.15,now);g.gain.exponentialRampToValueAtTime(.001,now+.05);
  o.connect(g);g.connect(out);o.start(now);o.stop(now+.05);
}

// ── CANVAS ──
const cv=document.getElementById('gc'),cx=cv.getContext('2d');
function rsz(){const gw=document.getElementById('gw');cv.width=gw.clientWidth;cv.height=gw.clientHeight;}
rsz();window.addEventListener('resize',rsz);

function draw(){
  const W=cv.width,H=cv.height;
  cx.clearRect(0,0,W,H);

  // Pure black bg
  cx.fillStyle='#0c0c0f';cx.fillRect(0,0,W,H);

  // Origin — bottom-left like Spribe
  const OX=W*.04, OY=H*.95;

  // ── SUNBURST RAYS — dark alternating stripes from bottom-left ──
  // Spribe has ~20 rays, dark charcoal/near-black alternating
  cx.save();
  const N=22;
  for(let i=0;i<N;i++){
    const a=(i/N)*Math.PI*.65+Math.PI*.025;
    const da=Math.PI*.015;
    const R=W*3;
    // Alternating very dark shades
    const even=i%2===0;
    const gr=cx.createLinearGradient(OX,OY,OX+Math.cos(a)*R,OY-Math.sin(a)*R);
    gr.addColorStop(0,even?'rgba(28,22,36,.80)':'rgba(20,15,26,.60)');
    gr.addColorStop(.45,even?'rgba(22,17,30,.20)':'rgba(15,11,20,.12)');
    gr.addColorStop(1,'rgba(0,0,0,0)');
    cx.beginPath();cx.moveTo(OX,OY);
    cx.lineTo(OX+Math.cos(a-da)*R,OY-Math.sin(a-da)*R);
    cx.lineTo(OX+Math.cos(a+da)*R,OY-Math.sin(a+da)*R);
    cx.closePath();cx.fillStyle=gr;cx.fill();
  }
  cx.restore();

  // ── PURPLE GLOW — bright center, exactly like Spribe ──
  // Center at ~55% width, ~40% height
  const pgx=W*.54,pgy=H*.40;
  const pg=cx.createRadialGradient(pgx,pgy,0,pgx,pgy,W*.50);
  pg.addColorStop(0,'rgba(130,0,220,.60)');
  pg.addColorStop(.18,'rgba(110,0,190,.45)');
  pg.addColorStop(.38,'rgba(85,0,160,.28)');
  pg.addColorStop(.60,'rgba(60,0,120,.12)');
  pg.addColorStop(1,'rgba(0,0,0,0)');
  cx.save();cx.fillStyle=pg;cx.fillRect(0,0,W,H);cx.restore();

  if(pathPts.length<2)return;
  const crashed=ST==='crashed';

  // Map pts to canvas
  const pts=pathPts.map(p=>({
    x:OX+p.t*(W*.93),
    y:OY-p.r*(H*.90)
  }));

  // ── RED FILL under curve ──
  cx.save();
  cx.beginPath();cx.moveTo(OX,OY);
  for(const p of pts)cx.lineTo(p.x,p.y);
  cx.lineTo(pts[pts.length-1].x,OY);cx.closePath();
  const fg=cx.createLinearGradient(0,OY-H*.85,0,OY);
  fg.addColorStop(0,crashed?'rgba(255,0,30,.30)':'rgba(230,0,30,.28)');
  fg.addColorStop(.55,'rgba(200,0,25,.09)');
  fg.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=fg;cx.fill();cx.restore();

  // ── RED TRAIL LINE — thick bright ──
  cx.save();
  cx.shadowBlur=crashed?6:22;
  cx.shadowColor=crashed?'rgba(255,0,30,.65)':'rgba(255,0,30,.55)';
  cx.strokeStyle='#e8001e';
  cx.lineWidth=3;cx.lineJoin='round';cx.lineCap='round';
  cx.beginPath();cx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length-1;i++){
    const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;
    cx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
  }
  cx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
  cx.stroke();cx.restore();

  // ── PLANE ──
  const tip=pts[pts.length-1];
  if(!crashed&&pts.length>4){
    const lb=Math.min(7,pts.length-1),ref=pts[pts.length-1-lb];
    const ang=Math.atan2(ref.y-tip.y,tip.x-ref.x);
    cx.save();cx.translate(tip.x,tip.y);cx.rotate(-ang);drawPlane(cx,false);cx.restore();
  }else if(crashed){
    cx.save();cx.translate(tip.x,tip.y);cx.rotate(Math.PI*.44);drawPlane(cx,true);cx.restore();
  }
}

function drawPlane(c,cr){
  c.save();c.scale(1.25,1.25);
  // Halo glow
  if(!cr){const rg=c.createRadialGradient(0,0,4,0,0,46);rg.addColorStop(0,'rgba(255,50,50,.22)');rg.addColorStop(1,'rgba(0,0,0,0)');c.beginPath();c.arc(0,0,46,0,Math.PI*2);c.fillStyle=rg;c.fill();}
  // Fuselage
  c.beginPath();c.moveTo(52,0);c.bezierCurveTo(42,-6,16,-8,-6,-8);c.lineTo(-20,-8);c.lineTo(-24,0);c.lineTo(-20,8);c.lineTo(-6,8);c.bezierCurveTo(16,8,42,6,52,0);c.closePath();
  c.fillStyle=cr?'#881111':'#cc1212';if(!cr){c.shadowBlur=12;c.shadowColor='rgba(255,40,40,.6)';}c.fill();c.shadowBlur=0;
  // Wing
  c.beginPath();c.moveTo(26,5);c.lineTo(-3,48);c.lineTo(-16,46);c.lineTo(-8,5);c.closePath();c.fillStyle=cr?'#771111':'#aa1111';c.fill();
  // Vtail
  c.beginPath();c.moveTo(-6,-8);c.lineTo(-22,-28);c.lineTo(-24,-28);c.lineTo(-20,-8);c.closePath();c.fillStyle='#991111';c.fill();
  // Hstab
  c.beginPath();c.moveTo(-8,-4);c.lineTo(-23,-16);c.lineTo(-25,-16);c.lineTo(-20,-4);c.closePath();c.fillStyle='#881111';c.fill();
  // Cockpit
  c.beginPath();c.ellipse(27,-3,14,6,-.08,0,Math.PI*2);c.fillStyle='rgba(60,155,255,.72)';c.shadowBlur=7;c.shadowColor='rgba(60,160,255,.45)';c.fill();
  c.beginPath();c.ellipse(24,-5,7,3,-.2,0,Math.PI);c.fillStyle='rgba(255,255,255,.30)';c.shadowBlur=0;c.fill();
  // Flame
  if(!cr){
    c.beginPath();c.moveTo(-20,0);c.bezierCurveTo(-36,-9,-48,0,-38,0);c.bezierCurveTo(-48,0,-36,9,-20,0);
    const fl=c.createLinearGradient(-20,0,-48,0);fl.addColorStop(0,'rgba(255,245,80,1)');fl.addColorStop(.5,'rgba(255,110,0,.9)');fl.addColorStop(1,'rgba(255,40,0,0)');
    c.fillStyle=fl;c.shadowBlur=22;c.shadowColor='rgba(255,140,0,.9)';c.fill();
    c.beginPath();c.moveTo(-20,0);c.bezierCurveTo(-28,-4,-33,0,-28,0);c.bezierCurveTo(-33,0,-28,4,-20,0);
    c.fillStyle='rgba(255,255,200,.95)';c.shadowBlur=8;c.fill();
  }
  c.restore();
}

// ── FLIGHT ──
function startFlight(){flightActive=true;flyStart=performance.now();localMulti=1;pathPts=[];lastTickM=0;startJet(false);}
function stopFlight(){flightActive=false;}

function animLoop(ts){
  if(flightActive&&flyStart!==null){
    const el=(ts-flyStart)/1000;
    localMulti=Math.exp(.09*el);
    const mv=document.getElementById('mv');mv.className='mval';mv.textContent=localMulti.toFixed(2)+'x';
    const tN=Math.min(el/24,.95),rN=Math.min(Math.log(Math.max(localMulti,1.001))*.40,.92);
    pathPts.push({t:tN,r:rN});if(pathPts.length>800)pathPts.shift();
    if(Math.floor(localMulti*2)>Math.floor(lastTickM*2)){playTick();lastTickM=localMulti;}
    [1,2].forEach(s=>{
      const bet=s===1?BET1:BET2,btn=document.getElementById('b'+s);
      if(bet&&!bet.cashedOut&&btn.classList.contains('cash'))
        btn.innerHTML=`Cash Out<br><span class="bsub">${localMulti.toFixed(2)}× KES ${(bet.stake*localMulti).toFixed(2)}</span>`;
    });
    autoTick();
  }
  draw();
  animFrame=requestAnimationFrame(animLoop);
}

// ── COUNTDOWN ──
let cdRound=null;
function startCountdown(from,rid){
  if(cdRound===rid&&waitTimer)return;
  cdRound=rid;clearInterval(waitTimer);countVal=from||5;
  const el=document.getElementById('wn');el.textContent=countVal;
  el.classList.remove('t');void el.offsetWidth;el.classList.add('t');setTimeout(()=>el.classList.remove('t'),120);
  waitTimer=setInterval(()=>{
    countVal--;el.textContent=Math.max(0,countVal);
    el.classList.remove('t');void el.offsetWidth;el.classList.add('t');setTimeout(()=>el.classList.remove('t'),120);
    if(countVal<=0){clearInterval(waitTimer);waitTimer=null;
      document.getElementById('wo').classList.remove('on');
      document.getElementById('mv').style.display='block';
      if(!flightActive)startFlight();}
  },1000);
}

// ── POLL ──
async function poll(){
  try{
    const r=await fetch('/api/aviator/state');const d=(await r.json()).data;if(!d)return;
    prevST=ST;ST=d.status;HIST=d.history||[];
    if(d.roundId!==lastRound){
      lastRound=d.roundId;if(ST!=='waiting'){BET1=null;BET2=null;}updBtns();
      if(ST==='waiting')setTimeout(()=>{if(AUTO[1].on)aqBet(1);if(AUTO[2].on)aqBet(2);},400);
    }
    updHist();
    const wo=document.getElementById('wo'),mv=document.getElementById('mv');
    if(ST==='waiting'){
      if(flightActive){stopFlight();pathPts=[];}stopJet();
      mv.className='mval wait';mv.style.display='none';wo.classList.add('on');
      startCountdown(d.waitSeconds||5,d.roundId||lastRound||'x');
    }else if(ST==='flying'){
      wo.classList.remove('on');mv.style.display='block';
      if(!flightActive){flyStart=performance.now()-Math.log(Math.max(d.multiplier,1.001))/.09*1000;startFlight();}
      if(Math.abs(d.multiplier-localMulti)>.5)localMulti=d.multiplier;
      if(prevST==='waiting')updBtns();
    }else if(ST==='crashed'){
      if(flightActive)stopFlight();stopJet();
      if(prevST==='flying')playCrash();
      mv.className='mval crash';mv.style.display='block';
      mv.textContent='Flew Away @ '+(d.crashPoint||d.multiplier||localMulti).toFixed(2)+'×';
      [BET1,BET2].forEach((b,i)=>{if(b&&!b.cashedOut){b.cashedOut=true;showT('💥 Lost KES '+b.stake.toFixed(2),'tl');if(i===0)BET1=null;else BET2=null;}});
      [1,2].forEach(s=>{if(AUTO[s].on)document.getElementById('ast'+s).textContent='⏳ Next round...';});
      updBtns();
    }
    fetch('/api/aviator/players').then(r=>r.json()).then(d=>{PLAYERS=d.data||[];document.getElementById('pc').textContent=PLAYERS.length;renderBL();}).catch(()=>{});
  }catch(e){}
}

function updHist(){
  const bar=document.getElementById('hbar');if(!HIST.length)return;
  const c=HIST.slice().reverse().slice(0,14).map(v=>{
    let cl=v>=10?'p':v>=3?'y':v>=2?'c':'r';
    return`<span class="hc ${cl}">${v.toFixed(2)}x</span>`;
  }).join('');
  bar.innerHTML=c+`<button class="hmore">•••</button>`;
}

function renderBL(){
  const el=document.getElementById('bl');let tot=0;
  document.getElementById('bcnt').textContent=`${PLAYERS.length}/${PLAYERS.length} Bets`;
  if(!PLAYERS.length){el.innerHTML='<div style="text-align:center;padding:12px;color:#1e1e1e;font-size:11px">No bets this round</div>';document.getElementById('tw').textContent='0.00';return;}
  el.innerHTML=PLAYERS.map(p=>{if(p.cashedOut)tot+=p.won;
    return`<div class="brow"><span class="u">${p.username}</span><span>${p.stake.toFixed(2)}</span>${p.cashedOut?`<span class="x">${p.cashoutMultiplier.toFixed(2)}x</span><span class="w">${p.won.toFixed(2)}</span>`:`<span class="d">—</span><span class="d">—</span>`}</div>`;
  }).join('');
  document.getElementById('tw').textContent=tot.toFixed(2);
}

// ── BETS ──
async function hbet(s){
  gAC();
  if(!USER){showT('Login to bet','ti');setTimeout(()=>location.href='/pages/login.html',1200);return;}
  const bet=s===1?BET1:BET2;
  if(flightActive&&bet&&!bet.cashedOut)await doCash(s);
  else if(!flightActive&&!bet)await doBet(s);
  else if(!flightActive&&bet)showT('Bet already placed','ti');
}
async function doBet(s){
  const stake=parseFloat(document.getElementById('s'+s).value);
  if(!stake||stake<10)return showT('Min bet KES 10','tl');
  playBet();const btn=document.getElementById('b'+s);btn.disabled=true;
  try{
    const r=await fetch('/api/aviator/bet',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+localStorage.getItem('token')},body:JSON.stringify({stake})});
    const d=await r.json();
    if(d.success){if(s===1)BET1={stake,cashedOut:false};else BET2={stake,cashedOut:false};USER.balance=d.newBalance;updBal();showT('✅ Bet KES '+stake.toFixed(2),'ti');updBtns();}
    else{showT(d.message||'Failed','tl');btn.disabled=false;}
  }catch(e){showT('Error','tl');btn.disabled=false;}
}
async function doCash(s){
  const btn=document.getElementById('b'+s);btn.disabled=true;
  try{
    const r=await fetch('/api/aviator/cashout',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+localStorage.getItem('token')}});
    const d=await r.json();
    if(d.success){if(s===1)BET1=null;else BET2=null;USER.balance=d.newBalance;updBal();playCashout();showT(`💰 ${d.multiplier.toFixed(2)}× Won KES ${d.won.toFixed(2)}`,'tw');updBtns();}
    else{showT(d.message||'Failed','tl');btn.disabled=false;}
  }catch(e){showT('Error','tl');btn.disabled=false;}
}
function updBtns(){
  [1,2].forEach(s=>{
    const btn=document.getElementById('b'+s);
    const stake=parseFloat(document.getElementById('s'+s).value)||0;
    const bet=s===1?BET1:BET2;
    btn.disabled=false;btn.className='bbtn';
    if(flightActive&&bet&&!bet.cashedOut){
      btn.classList.add('cash');btn.innerHTML=`Cash Out<br><span class="bsub">${localMulti.toFixed(2)}× KES ${(bet.stake*localMulti).toFixed(2)}</span>`;
    }else if(flightActive){
      btn.classList.add('wait');btn.innerHTML='Wait<br><span class="bsub">Next round</span>';btn.disabled=true;
    }else if(!flightActive&&bet){
      btn.classList.add('placed');btn.innerHTML=`Placed ✓<br><span class="bsub">KES ${bet.stake.toFixed(2)}</span>`;btn.disabled=true;
    }else{
      btn.classList.add('bet');btn.innerHTML=`Bet<br><span class="bsub">${stake.toFixed(2)} KES</span>`;
    }
  });
}
function chg(s,d){const e=document.getElementById('s'+s);e.value=Math.max(10,(parseFloat(e.value)||10)+d);updBtns();}
function ss(s,v){document.getElementById('s'+s).value=v;updBtns();}
function chgA(s,d){const e=document.getElementById('as'+s);e.value=Math.max(10,(parseFloat(e.value)||10)+d);}
function swTab(s,tab,btn){
  btn.parentElement.querySelectorAll(s===1?'.tab':'.s2tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');
  document.getElementById('mp'+s).style.display=tab==='bet'?'':'none';
  document.getElementById('ap'+s).classList.toggle('on',tab==='auto');
}
function togS2(){s2collapsed=!s2collapsed;document.getElementById('s2body').style.display=s2collapsed?'none':'';document.getElementById('s2c').textContent=s2collapsed?'+':'−';}
function togAuto(s){
  if(!USER){showT('Login to use Auto','ti');return;}
  AUTO[s].on=!AUTO[s].on;
  const btn=document.getElementById('ab'+s),lbl=document.getElementById('ab'+s+'s');
  if(AUTO[s].on){btn.classList.add('on');lbl.textContent='ON';document.getElementById('ast'+s).textContent='⚡ Active';if(ST==='waiting'||ST==='crashed')aqBet(s);}
  else{btn.classList.remove('on');lbl.textContent='OFF';document.getElementById('ast'+s).textContent='';}
}
async function aqBet(s){
  if(!AUTO[s].on||flightActive)return;const bet=s===1?BET1:BET2;if(bet)return;
  const stake=parseFloat(document.getElementById('as'+s).value);if(!stake||stake<10){showT('Auto: min KES 10','tl');return;}
  document.getElementById('ast'+s).textContent='⏳ Placing...';
  const btn=document.getElementById('b'+s);btn.disabled=true;
  try{
    const r=await fetch('/api/aviator/bet',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+localStorage.getItem('token')},body:JSON.stringify({stake})});
    const d=await r.json();
    if(d.success){USER.balance=d.newBalance;updBal();if(s===1)BET1={stake,cashedOut:false};else BET2={stake,cashedOut:false};
      document.getElementById('ast'+s).textContent='✅ KES '+stake.toFixed(2);showT('⚡ Auto KES '+stake.toFixed(2),'ti');updBtns();}
    else{document.getElementById('ast'+s).textContent='❌ '+(d.message||'Failed');btn.disabled=false;}
  }catch(e){document.getElementById('ast'+s).textContent='❌ Error';btn.disabled=false;}
}
async function acCheck(s){
  if(!AUTO[s].on)return;const bet=s===1?BET1:BET2;if(!bet||bet.cashedOut)return;
  if(localMulti>=(parseFloat(document.getElementById('aco'+s).value)||2)){
    document.getElementById('ast'+s).textContent=`💰 @${localMulti.toFixed(2)}×`;await doCash(s);}
}
function autoTick(){if(flightActive){if(AUTO[1].on)acCheck(1);if(AUTO[2].on)acCheck(2);}}
function setBT(el){document.querySelectorAll('.btab').forEach(t=>t.classList.remove('on'));el.classList.add('on');}
function updBal(){if(USER)document.getElementById('bv').textContent=parseFloat(USER.balance||0).toFixed(2);}
let tTmr=null;
function showT(msg,cls=''){const el=document.getElementById('tst');el.textContent=msg;el.className='toast on '+cls;clearTimeout(tTmr);tTmr=setTimeout(()=>el.classList.remove('on'),3500);}
document.getElementById('s1').addEventListener('input',updBtns);
document.getElementById('s2').addEventListener('input',updBtns);

window.addEventListener('DOMContentLoaded',()=>{
  const t=localStorage.getItem('token'),u=localStorage.getItem('user');
  if(t&&u){USER=JSON.parse(u);updBal();}
  let au=false;
  function unlock(){if(au)return;au=true;gAC();if(flightActive)startJet(true);}
  document.addEventListener('touchstart',unlock,{capture:true,once:true});
  document.addEventListener('click',unlock,{capture:true,once:true});
  document.getElementById('wo').classList.add('on');
  startCountdown(5,'init');
  requestAnimationFrame(animLoop);
  poll();setInterval(poll,300);
});
</script>
