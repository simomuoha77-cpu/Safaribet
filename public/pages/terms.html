<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Terms & Conditions – SafariBet</title>
<script src="/js/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--g:#00c853;--bg:#0a0e0a;--s1:#111711;--s2:#182018;--s3:#1e271e;--bd:rgba(0,200,83,0.1);--tx:#e8f5e9;--mt:#6a8a6a;--yl:#ffd600;--hh:52px;--bn:0px;--hdr:rgba(8,12,8,0.98)}
html[data-theme="light"]{--g:#00a844;--bg:#f4f7f4;--s1:#fff;--s2:#eef3ee;--s3:#e4ece4;--bd:rgba(0,140,58,0.18);--tx:#14231a;--mt:#5c7a63;--hdr:rgba(255,255,255,0.98)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx)}
header{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--hh);background:var(--hdr);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;backdrop-filter:blur(20px)}
.back{font-size:20px;cursor:pointer;color:var(--g);text-decoration:none}.logo{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--g)}.logo span{color:var(--yl)}
.main{margin-top:var(--hh);padding:20px 16px 40px;max-width:600px;margin-left:auto;margin-right:auto}
.pg-title{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;margin-bottom:4px}
.pg-date{font-size:12px;color:var(--mt);margin-bottom:24px}
.content h3{font-size:15px;font-weight:700;margin:20px 0 8px;color:var(--g)}
.content p,.content li{font-size:13px;line-height:1.8;color:var(--mt)}
.content ul{padding-left:18px;margin-bottom:8px}
</style></head><body>
<header><a class="back" href="/account">←</a><div class="logo">Safari<span>Bet</span></div></header>
<main class="main">
  <div class="pg-title">Terms & Conditions</div>
  <div class="pg-date" id="pgDate">Loading...</div>
  <div class="content" id="content">Loading...</div>
</main>
<script>
fetch('/api/settings/site').then(r=>r.json()).then(d=>{
  if(!d.success) return;
  const s=d.data;
  document.title=`Terms & Conditions – ${s.site_name}`;
  document.querySelector('.logo').innerHTML=`${s.site_name.replace(/(\w+)(\w)/,(_,a,b)=>`${a}<span style="color:var(--yl)">${b}</span>`)}`;
  document.getElementById('pgDate').textContent=`Effective as of January 2025 · ${s.site_name}`;
  document.getElementById('content').innerHTML=s.terms_content;
});
</script></body></html>
